<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg-2:#0f0f18;--bg-3:#14141f;--surface:rgba(20,20,30,0.6);--surface-2:rgba(30,30,45,0.5);--border:rgba(139,92,246,0.12);--border-h:rgba(139,92,246,0.35);--text:#f5f5f7;--text-2:#a1a1aa;--text-3:#71717a;--violet:#8b5cf6;--violet-h:#a78bfa;--violet-glow:rgba(139,92,246,0.5);--pink:#ec4899;--cyan:#06b6d4;--amber:#f59e0b;--emerald:#10b981;--rose:#f43f5e;--glass:rgba(20,20,30,0.7);--glass-blur:saturate(180%) blur(20px);--radius:14px;--shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(139,92,246,0.1);--ease:cubic-bezier(0.4,0,0.2,1)}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
body{min-height:100vh;background:var(--bg)}
img{display:block;max-width:100%}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}a{color:inherit;text-decoration:none}
h1,h2,h3{font-family:'Space Grotesk','Inter',sans-serif;font-weight:700;letter-spacing:-0.02em;line-height:1.1}
::selection{background:var(--violet);color:#fff}:focus-visible{outline:2px solid var(--violet);outline-offset:2px;border-radius:4px}
.header{position:sticky;top:0;z-index:100;backdrop-filter:var(--glass-blur);background:rgba(10,10,15,0.72);border-bottom:1px solid var(--border)}
.header-inner{max-width:1600px;margin:0 auto;padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:24px}
.logo{display:flex;align-items:center}.logo img{height:36px;filter:drop-shadow(0 0 12px var(--violet-glow))}
.nav{display:flex;gap:4px}.nav a{padding:10px 16px;border-radius:10px;font-size:0.9rem;font-weight:500;color:var(--text-2);transition:all 0.25s}
.nav a:hover,.nav a.active{color:var(--text);background:var(--surface)}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:42px;height:42px;display:grid;place-items:center;border-radius:10px;transition:all 0.25s;color:var(--text-2)}
.icon-btn:hover{background:var(--surface);color:var(--text)}.icon-btn svg{width:20px;height:20px}
.mobile-menu-btn{display:none}
@media(max-width:960px){.nav{display:none}.mobile-menu-btn{display:grid}}

.banner{position:relative;min-height:clamp(380px,50vh,540px);display:flex;align-items:flex-end;overflow:hidden}
.banner-bg{position:absolute;inset:0;z-index:0}.banner-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.55)}
.banner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,var(--bg) 100%),linear-gradient(90deg,rgba(10,10,15,0.8),transparent 60%);z-index:1}
.banner-content{position:relative;z-index:2;max-width:1600px;margin:0 auto;padding:clamp(40px,8vh,80px) clamp(16px,4vw,40px);width:100%;display:grid;grid-template-columns:clamp(140px,20vw,240px) 1fr;gap:clamp(20px,4vw,40px);align-items:end}
@media(max-width:680px){.banner-content{grid-template-columns:1fr;text-align:center}}
.poster{aspect-ratio:2/3;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 30px var(--violet-glow);border:1px solid var(--border-h)}
.poster img{width:100%;height:100%;object-fit:cover}
.banner-info h1{font-size:clamp(1.8rem,5vw,3.5rem);margin-bottom:12px;text-shadow:0 4px 30px rgba(0,0,0,0.7)}
.banner-info .sub{color:var(--text-2);margin-bottom:16px;font-size:0.95rem}
.meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.meta-chip{padding:6px 12px;background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:8px;font-size:0.78rem;font-weight:500;display:flex;align-items:center;gap:6px}
.meta-chip strong{color:var(--violet-h)}
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:12px 22px;border-radius:12px;font-weight:600;font-size:0.9rem;transition:all 0.25s}
.btn-primary{background:linear-gradient(135deg,var(--violet),#6d28d9);color:#fff;box-shadow:0 8px 24px var(--violet-glow)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--border-h);background:var(--surface)}

.container{max-width:1600px;margin:0 auto;padding:clamp(24px,5vw,56px) clamp(16px,4vw,40px)}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:clamp(24px,4vw,48px)}
@media(max-width:960px){.layout{grid-template-columns:1fr}}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:32px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:12px 18px;font-weight:500;color:var(--text-2);border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--violet-h);border-bottom-color:var(--violet)}
.tab-panel{display:none;animation:fade 0.4s}
.tab-panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.section-title{font-size:clamp(1.2rem,2vw,1.6rem);margin-bottom:16px;background:linear-gradient(135deg,#fff,var(--violet-h));-webkit-background-clip:text;background-clip:text;color:transparent}

.synopsis{font-size:1rem;line-height:1.75;color:var(--text-2);margin-bottom:32px}

.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.char{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform 0.3s}
.char:hover{transform:translateY(-4px);border-color:var(--border-h)}
.char-imgs{display:grid;grid-template-columns:1fr 1fr;aspect-ratio:2/1;position:relative}
.char-imgs img{width:100%;height:100%;object-fit:cover}
.char-imgs::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 45%,rgba(10,10,15,0.4) 50%,transparent 55%);pointer-events:none}
.char-body{padding:12px}
.char-name{font-weight:600;font-size:0.85rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-role{font-size:0.72rem;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ep-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.ep-btn{padding:14px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-weight:600;transition:all 0.2s;text-align:center}
.ep-btn:hover{background:var(--violet);border-color:var(--violet);transform:translateY(-2px)}
.ep-btn small{display:block;font-size:0.7rem;color:var(--text-3);font-weight:400;margin-top:4px}

.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.rec{cursor:pointer;border-radius:10px;overflow:hidden;background:var(--surface);transition:transform 0.3s}
.rec:hover{transform:translateY(-4px)}
.rec img{aspect-ratio:2/3;width:100%;object-fit:cover}
.rec-body{padding:10px}
.rec-title{font-size:0.82rem;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

.sidebar-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;backdrop-filter:blur(10px)}
.sidebar-box h3{font-size:0.95rem;margin-bottom:14px;color:var(--violet-h);text-transform:uppercase;letter-spacing:0.1em;font-size:0.75rem}
.stat-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.88rem}
.stat-row:last-child{border:none}
.stat-row span:first-child{color:var(--text-2)}
.stat-row strong{color:var(--text)}
.genre-list{display:flex;flex-wrap:wrap;gap:8px}
.genre-tag{padding:6px 12px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);border-radius:20px;font-size:0.78rem;color:var(--violet-h);transition:all 0.2s;cursor:pointer}
.genre-tag:hover{background:var(--violet);color:#fff}

.trailer-wrap{aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;margin-bottom:24px;border:1px solid var(--border)}
.trailer-wrap iframe{width:100%;height:100%;border:none}

.review{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.review-head{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.review-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--pink));display:grid;place-items:center;font-weight:700;color:#fff}
.review-body{font-size:0.9rem;color:var(--text-2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.review-score{margin-left:auto;padding:4px 10px;background:var(--violet);border-radius:6px;font-size:0.78rem;font-weight:700}

.footer{margin-top:80px;padding:60px clamp(16px,4vw,40px) 40px;border-top:1px solid var(--border);text-align:center}
.footer-logo{height:44px;margin:0 auto 20px;filter:drop-shadow(0 0 14px var(--violet-glow))}
.footer-manifesto{max-width:520px;margin:0 auto 24px;color:var(--text-2);font-size:0.92rem;line-height:1.7}
.footer-social{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.footer-social a{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;background:var(--surface);border:1px solid var(--border);transition:all 0.25s}
.footer-social a:hover{background:var(--violet);border-color:var(--violet)}
.footer-social svg{width:18px;height:18px}
.footer-disclaimer{max-width:600px;margin:0 auto 16px;color:var(--text-3);font-size:0.78rem;font-style:italic}
.footer-copy{color:var(--text-3);font-size:0.8rem}

.skeleton{background:linear-gradient(90deg,var(--bg-3) 0%,var(--bg-2) 50%,var(--bg-3) 100%);background-size:200% 100%;animation:shimmer 1.8s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.sidebar,.overlay{display:none}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:min(320px,85vw);background:var(--bg-2);border-right:1px solid var(--border);z-index:200;transform:translateX(-100%);transition:transform 0.35s;padding:24px;overflow-y:auto}
.sidebar.open{transform:translateX(0);display:block}
.sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.sidebar-links{display:flex;flex-direction:column;gap:4px}
.sidebar-links a{padding:14px 16px;border-radius:10px;font-weight:500}
.sidebar-links a:hover{background:var(--surface)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.show{opacity:1;pointer-events:auto;display:block}
</style>

<script>
const API='https://api.jikan.moe/v4';
const $=s=>document.querySelector(s);
const params=new URLSearchParams(location.search);
const ID=params.get('id');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
if(!ID){location.href='404.html'}

async function jikan(ep){
  try{const r=await fetch(API+ep);if(!r.ok)throw 0;return await r.json()}catch(e){return{data:null}}
}

/* Library helper */
function getLib(){return JSON.parse(localStorage.getItem('nt_library')||'{"watchlist":[],"favorites":[],"history":[],"continue":[],"completed":[],"dropped":[]}')}
function saveLib(l){localStorage.setItem('nt_library',JSON.stringify(l))}
function inList(list,id){return list.some(x=>x.mal_id===id)}
function toggleList(listName,anime){
  const lib=getLib();
  const i=lib[listName].findIndex(x=>x.mal_id===anime.mal_id);
  if(i>=0)lib[listName].splice(i,1);
  else lib[listName].unshift(anime);
  saveLib(lib);
  return i<0;
}

/* Tabs */
function initTabs(){
  $$('.tab').forEach(t=>t.addEventListener('click',()=>{
    $$('.tab').forEach(x=>x.classList.remove('active'));
    $$('.tab-panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $('#panel-'+t.dataset.tab).classList.add('active');
  }));
}

/* Render */
async function render(){
  if(!ID)return;
  const [animeRes,charsRes,recsRes,reviewsRes]=await Promise.all([
    jikan(`/anime/${ID}/full`),
    jikan(`/anime/${ID}/characters`),
    jikan(`/anime/${ID}/recommendations`),
    jikan(`/anime/${ID}/reviews`)
  ]);
  const a=animeRes.data;
  if(!a){$('#main').innerHTML='<div class="container" style="text-align:center;padding:80px 20px"><h2 style="font-size:2rem;margin-bottom:12px">Anime not found</h2><p style="color:var(--text-2);margin-bottom:24px">We couldn\'t find this title.</p><a href="index.html" class="btn btn-primary">Back Home</a></div>';return}

  document.title=`${a.title_english||a.title} — NamiTube Infinity`;

  const trailer=a.trailer?.embed_url||'';
  const episodes=a.episodes||12;
  const chars=(charsRes.data||[]).slice(0,12);
  const recs=(recsRes.data||[]).slice(0,8);
  const reviews=(reviewsRes.data||[]).slice(0,4);

  const bannerBg=a.images?.jpg?.large_image_url||a.images?.jpg?.image_url;
  const poster=a.images?.jpg?.large_image_url||a.images?.jpg?.image_url;
  const genres=[...(a.genres||[]),...(a.themes||[]),...(a.demographics||[])];

  const lib=getLib();
  const inWatch=inList(lib.watchlist,a);
  const inFav=inList(lib.favorites,a);

  $('#main').innerHTML=`
    <section class="banner">
      <div class="banner-bg"><img src="${esc(bannerBg)}" alt=""></div>
      <div class="banner-content">
        <div class="poster"><img src="${esc(poster)}" alt="${esc(a.title)}"></div>
        <div class="banner-info">
          <h1>${esc(a.title_english||a.title)}</h1>
          ${a.title!==a.title_english&&a.title_english?`<p class="sub">${esc(a.title)} ${a.title_japanese?'· '+esc(a.title_japanese):''}</p>`:''}
          <div class="meta-row">
            ${a.score?`<span class="meta-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="#f59e0b"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg><strong>${a.score.toFixed(1)}</strong></span>`:''}
            ${a.rank?`<span class="meta-chip">Rank <strong>#${a.rank}</strong></span>`:''}
            ${a.type?`<span class="meta-chip">${a.type}</span>`:''}
            ${a.episodes?`<span class="meta-chip">${a.episodes} Episodes</span>`:''}
            ${a.status?`<span class="meta-chip">${a.status}</span>`:''}
            ${a.rating?`<span class="meta-chip">${a.rating.split(' - ')[0]}</span>`:''}
            ${a.year?`<span class="meta-chip">${a.season||''} ${a.year}</span>`:''}
          </div>
          <div class="action-row">
            <a class="btn btn-primary" href="watch.html?id=${a.mal_id}&ep=1&lang=sub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Now
            </a>
            <button class="btn btn-ghost" id="watchlistBtn" data-active="${inWatch}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="${inWatch?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${inWatch?'In Watchlist':'Add to Watchlist'}
            </button>
            <button class="btn btn-ghost" id="favBtn" data-active="${inFav}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="${inFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${inFav?'Favorited':'Favorite'}
            </button>
          </div>
        </div>
      </div>
    </section>

    <div class="container">
      <div class="layout">
        <div>
          <div class="tabs">
            <button class="tab active" data-tab="overview">Overview</button>
            <button class="tab" data-tab="episodes">Episodes</button>
            <button class="tab" data-tab="characters">Characters</button>
            <button class="tab" data-tab="reviews">Reviews</button>
            <button class="tab" data-tab="related">Related</button>
          </div>

          <div class="tab-panel active" id="panel-overview">
            ${trailer?`<div class="trailer-wrap"><iframe src="${esc(trailer)}" allowfullscreen loading="lazy" title="Trailer"></iframe></div>`:''}
            <h2 class="section-title">Synopsis</h2>
            <p class="synopsis">${esc(a.synopsis)||'No synopsis available.'}</p>
            ${a.background?`<h2 class="section-title">Background</h2><p class="synopsis">${esc(a.background)}</p>`:''}
            ${recs.length?`<h2 class="section-title">You May Also Like</h2><div class="rec-grid">${recs.map(r=>{const e=r.entry;return `<a class="rec" href="anime.html?id=${e.mal_id}"><img src="${esc(e.images?.jpg?.image_url||'')}" alt="${esc(e.title)}"><div class="rec-body"><div class="rec-title">${esc(e.title)}</div></div></a>`}).join('')}</div>`:''}
          </div>

          <div class="tab-panel" id="panel-episodes">
            <h2 class="section-title">Episodes (${episodes})</h2>
            <div class="ep-list">
              ${Array.from({length:Math.min(episodes,100)},(_,i)=>`<a class="ep-btn" href="watch.html?id=${a.mal_id}&ep=${i+1}&lang=sub">Episode ${i+1}<small>Watch Sub</small></a>`).join('')}
            </div>
          </div>

          <div class="tab-panel" id="panel-characters">
            <h2 class="section-title">Characters & Voice Actors</h2>
            <div class="char-grid">
              ${chars.map(c=>{const ch=c.character,va=c.voice_actors?.[0];return `<div class="char"><div class="char-imgs"><img src="${esc(ch.images?.jpg?.image_url||'')}" alt="${esc(ch.name)}">${va?`<img src="${esc(va.person?.images?.jpg?.image_url||'')}" alt="${esc(va.person?.name||'')}">`:''}</div><div class="char-body"><div class="char-name">${esc(ch.name)}</div><div class="char-role">${esc(c.role)}${va?' · '+esc(va.language):''}</div>${va?`<div class="char-role" style="margin-top:2px;color:var(--violet-h)">${esc(va.person?.name||'')}</div>`:''}</div></div>`}).join('')||'<p style="color:var(--text-3)">No characters available</p>'}
            </div>
          </div>

          <div class="tab-panel" id="panel-reviews">
            <h2 class="section-title">Reviews</h2>
            ${reviews.length?reviews.map(r=>`<div class="review"><div class="review-head"><div class="review-avatar">${esc((r.user?.username||'U')[0].toUpperCase())}</div><div><div style="font-weight:600">${esc(r.user?.username||'Anonymous')}</div><div style="font-size:0.78rem;color:var(--text-3)">${new Date(r.date).toLocaleDateString()}</div></div><div class="review-score">${r.score}</div></div><div class="review-body">${esc(r.review)}</div></div>`).join(''):'<p style="color:var(--text-3)">No reviews yet.</p>'}
          </div>

          <div class="tab-panel" id="panel-related">
            <h2 class="section-title">Relations</h2>
            <div class="rec-grid">
              ${(a.relations||[]).flatMap(r=>r.entry.map(e=>`<a class="rec" href="${e.type==='anime'?`anime.html?id=${e.mal_id}`:'#'}"><div style="aspect-ratio:2/3;background:var(--surface);display:grid;place-items:center;padding:10px;text-align:center"><div><div style="font-size:0.72rem;color:var(--text-3);margin-bottom:4px">${esc(r.relation)}</div><div style="font-weight:600;font-size:0.88rem">${esc(e.name)}</div><div style="font-size:0.72rem;color:var(--text-3);margin-top:4px">${esc(e.type)}</div></div></div></a>`)).join('')||'<p style="color:var(--text-3)">No relations.</p>'}
            </div>
          </div>
        </div>

        <aside>
          <div class="sidebar-box">
            <h3>Statistics</h3>
            <div class="stat-row"><span>Score</span><strong>${a.score?.toFixed(2)||'—'}</strong></div>
            <div class="stat-row"><span>Ranked</span><strong>#${a.rank||'—'}</strong></div>
            <div class="stat-row"><span>Popularity</span><strong>#${a.popularity||'—'}</strong></div>
            <div class="stat-row"><span>Members</span><strong>${(a.members||0).toLocaleString()}</strong></div>
            <div class="stat-row"><span>Favorites</span><strong>${(a.favorites||0).toLocaleString()}</strong></div>
          </div>

          <div class="sidebar-box">
            <h3>Information</h3>
            <div class="stat-row"><span>Type</span><strong>${a.type||'—'}</strong></div>
            <div class="stat-row"><span>Episodes</span><strong>${a.episodes||'—'}</strong></div>
            <div class="stat-row"><span>Status</span><strong>${a.status||'—'}</strong></div>
            <div class="stat-row"><span>Aired</span><strong style="text-align:right;max-width:60%">${a.aired?.string||'—'}</strong></div>
            ${a.broadcast?.string?`<div class="stat-row"><span>Broadcast</span><strong>${a.broadcast.string}</strong></div>`:''}
            <div class="stat-row"><span>Duration</span><strong>${a.duration||'—'}</strong></div>
            <div class="stat-row"><span>Source</span><strong>${a.source||'—'}</strong></div>
            ${a.studios?.length?`<div class="stat-row"><span>Studios</span><strong>${a.studios.map(s=>s.name).join(', ')}</strong></div>`:''}
            ${a.producers?.length?`<div class="stat-row"><span>Producers</span><strong style="text-align:right;max-width:60%">${a.producers.slice(0,3).map(s=>s.name).join(', ')}</strong></div>`:''}
          </div>

          ${genres.length?`<div class="sidebar-box"><h3>Genres</h3><div class="genre-list">${genres.map(g=>`<a class="genre-tag" href="discover.html?genre=${g.mal_id}">${esc(g.name)}</a>`).join('')}</div></div>`:''}

          ${a.externals?.length?`<div class="sidebar-box"><h3>External Links</h3><div style="display:flex;flex-direction:column;gap:8px">${a.externals.map(e=>`<a href="${esc(e.url)}" target="_blank" rel="noopener" style="padding:10px;background:var(--surface-2,rgba(30,30,45,0.4));border:1px solid var(--border);border-radius:8px;font-size:0.85rem;transition:all 0.2s">${esc(e.name)} ↗</a>`).join('')}</div></div>`:''}
        </aside>
      </div>
    </div>
  `;

  initTabs();
  $('#watchlistBtn').addEventListener('click',()=>{
    const added=toggleList('watchlist',{mal_id:a.mal_id,title:a.title,title_english:a.title_english,images:a.images,type:a.type,episodes:a.episodes,score:a.score});
    $('#watchlistBtn').dataset.active=added;
    $('#watchlistBtn').innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="${added?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>${added?'In Watchlist':'Add to Watchlist'}`;
    toast(added?'Added to Watchlist':'Removed from Watchlist');
  });
  $('#favBtn').addEventListener('click',()=>{
    const added=toggleList('favorites',{mal_id:a.mal_id,title:a.title,title_english:a.title_english,images:a.images,type:a.type,episodes:a.episodes,score:a.score});
    $('#favBtn').dataset.active=added;
    $('#favBtn').innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="${added?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${added?'Favorited':'Favorite'}`;
    toast(added?'Added to Favorites':'Removed from Favorites');
  });
}

function toast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border-h);padding:14px 20px;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5);z-index:9999;transform:translateY(20px);opacity:0;transition:all 0.3s';
  t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.transform='translateY(0)';t.style.opacity='1'});
  setTimeout(()=>{t.style.transform='translateY(20px)';t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500);
}

$('#menuBtn').addEventListener('click',()=>{$('#sidebar').classList.add('open');$('#overlay').classList.add('show')});
$('#closeSidebar').addEventListener('click',()=>{$('#sidebar').classList.remove('open');$('#overlay').classList.remove('show')});
$('#overlay').addEventListener('click',()=>{$('#sidebar').classList.remove('open');$('#overlay').classList.remove('show')});

render();
</script>
</body>
</html>
