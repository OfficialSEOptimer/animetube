    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
    <style>
        :root {
            --bg-deep: #000;
            --bg-primary: #0a0a0a;
            --bg-card: #141414;
            --bg-glass: rgba(20, 20, 30, 0.55);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(138, 43, 226, 0.35);
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --text-muted: #707070;
            --accent-violet: #8b2fc9;
            --accent-neon: #b34dff;
            --gold: #d4a853;
            --radius-md: 14px;
            --radius-lg: 20px;
            --font-body: 'Inter', 'Segoe UI', system-ui, sans-serif;
            --shadow-card: 0 4px 30px rgba(0, 0, 0, 0.5);
            --header-height: 64px;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            max-width: 100%;
            background: #000;
            color: var(--text-primary);
            font-family: var(--font-body);
        }
        body {
            overflow-x: hidden;
            max-width: 100%;
            min-height: 100vh;
            background: #000;
        }
        @media(prefers-reduced-motion:reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        header.global-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-subtle);
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 clamp(12px, 3vw, 32px);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            gap: 16px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .hamburger-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: #fff;
            cursor: pointer;
            font-size: 1.3rem;
        }
        .logo-img {
            height: clamp(32px, 5vw, 42px);
            filter: drop-shadow(0 0 14px rgba(179, 77, 255, 0.5));
        }
        .header-right {
            display: flex;
            gap: 10px;
        }
        .header-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: min(85vw, 320px);
            height: 100dvh;
            z-index: 1200;
            background: rgba(10, 10, 14, 0.95);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-subtle);
            transform: translateX(-105%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }
        .sidebar.active {
            transform: translateX(0);
        }
        .sidebar-close {
            align-self: flex-end;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: #fff;
            cursor: pointer;
        }
        .sidebar a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .watch-container {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 clamp(12px, 3vw, 32px) 20px;
        }
        .player-section {
            position: relative;
            background: #000;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            margin: 16px 0;
            box-shadow: var(--shadow-card);
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .player-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .cine-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.7) 100%);
            transition: opacity 0.5s;
        }
        .cine-overlay.active {
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.9) 100%);
        }
        .ambient-glow {
            position: absolute;
            inset: -40px;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.3;
            pointer-events: none;
        }
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-card);
            align-items: center;
            border-top: 1px solid var(--border-subtle);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border-subtle);
            background: var(--bg-glass);
            color: #fff;
            transition: var(--transition-fast);
            font-family: var(--font-body);
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(138, 43, 226, 0.3);
            border-color: var(--border-glow);
        }
        .btn.active-btn {
            background: var(--accent-violet);
            border-color: var(--accent-neon);
        }
        .btn-primary {
            background: var(--accent-violet);
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.35);
        }
        .episode-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 0;
        }
        .ep-chip {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: #ccc;
            cursor: pointer;
            font-size: 0.78rem;
            transition: var(--transition-fast);
            font-family: var(--font-body);
        }
        .ep-chip:hover,
        .ep-chip.active {
            background: var(--accent-violet);
            border-color: var(--accent-neon);
            color: #fff;
        }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            margin: 8px 0;
            align-items: center;
            font-size: 0.85rem;
        }
        .info-row span {
            color: var(--text-secondary);
        }
        .rec-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        .rec-row::-webkit-scrollbar {
            display: none;
        }
        .rec-thumb {
            flex: 0 0 100px;
            text-decoration: none;
            color: inherit;
            text-align: center;
            font-size: 0.7rem;
            transition: var(--transition-fast);
        }
        .rec-thumb:hover {
            transform: translateY(-4px);
        }
        .rec-thumb img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }
        .footer {
            border-top: 1px solid var(--border-subtle);
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>
    <header class="global-header" id="globalHeader">
        <div class="header-inner">
            <div class="header-left">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">☰</button>
                <a href="index.html"><img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube Infinity" class="logo-img" width="160" height="42"></a>
            </div>
            <div class="header-right">
                <a href="search.html" class="header-icon-btn">🔍</a><a href="profile.html" class="header-icon-btn">👤</a>
            </div>
        </div>
    </header>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">✕</button>
        <a href="index.html">🏠 Home</a><a href="discover.html">🔍 Discover</a><a href="collections.html">💎 Collections</a>
        <a href="studios.html">🏢 Studios</a><a href="characters.html">🎭 Characters</a><a href="rankings.html">🏆 Rankings</a>
        <a href="releases.html">📅 Releases</a><a href="vault.html">🏛️ Vault</a><a href="community.html">💬 Community</a>
        <a href="news.html">📰 News</a><a href="search.html">🔍 Search</a><a href="profile.html">👤 Profile</a>
    </aside>
    <main class="watch-container">
        <div class="player-section" id="playerSection">
            <div class="player-wrapper" id="playerWrapper">
                <iframe class="player-iframe" id="playerIframe" src="" allowfullscreen allow="autoplay; encrypted-media" title="Anime Stream"></iframe>
            </div>
            <div class="ambient-glow" id="ambientGlow"></div>
            <div class="controls-bar">
                <button class="btn" id="cineToggle" title="Toggle Cine Mode">🎬 Cine Mode</button>
                <button class="btn" id="fullscreenBtn" title="Fullscreen">⛶ Fullscreen</button>
                <button class="btn" id="autoNextBtn" title="Auto Next Episode">▶ Auto Next</button>
                <select class="btn" id="languageSelect" style="appearance:auto;">
                    <option value="sub">Sub</option>
                    <option value="dub">Dub</option>
                </select>
                <span style="margin-left:auto;font-size:0.8rem;color:var(--text-muted);" id="nowPlayingLabel">Loading...</span>
            </div>
            <div class="info-row" id="animeInfoRow">
                <span id="animeTitleDisplay">Loading...</span>
                <span id="episodeInfo">Episode ?</span>
                <a href="#" id="animeDetailsLink" class="btn" style="margin-left:auto;">ℹ Details</a>
            </div>
            <div class="controls-bar">
                <span style="font-size:0.8rem;color:var(--text-muted);">Episodes:</span>
                <div class="episode-selector" id="episodeSelector"></div>
            </div>
            <div class="controls-bar" id="relatedBar" style="display:none;">
                <span style="font-size:0.8rem;color:var(--text-muted);">Related:</span>
                <div class="rec-row" id="relatedRow"></div>
            </div>
        </div>
    </main>
    <div class="cine-overlay" id="cineOverlay"></div>
    <footer class="footer">
        <p>© 2026 NamiTube Infinity. This site does not store any files. All streams provided by third parties.</p>
    </footer>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const malId = params.get('id') || '1';
            const STREAM_BASE = 'https://megaplay.buzz/stream/mal/';
            let currentEpisode = parseInt(params.get('ep') || '1');
            let currentLanguage = params.get('lang') || 'sub';
            let totalEpisodes = 0;
            let autoNext = false;
            let cineMode = false;
            const playerIframe = document.getElementById('playerIframe');
            const episodeSelector = document.getElementById('episodeSelector');
            const languageSelect = document.getElementById('languageSelect');
            const nowPlayingLabel = document.getElementById('nowPlayingLabel');
            const animeTitleDisplay = document.getElementById('animeTitleDisplay');
            const episodeInfo = document.getElementById('episodeInfo');
            const animeDetailsLink = document.getElementById('animeDetailsLink');
            const ambientGlow = document.getElementById('ambientGlow');
            const cineOverlay = document.getElementById('cineOverlay');
            const JIKAN = 'https://api.jikan.moe/v4';

            async function fetchAPI(url) {
                const ctrl = new AbortController();
                const t = setTimeout(() => ctrl.abort(), 8000);
                try {
                    const r = await fetch(JIKAN + url, { signal: ctrl.signal });
                    return r.ok ? await r.json() : null;
                } catch (e) { return null; } finally { clearTimeout(t); }
            }

            function updateStream() {
                const src = `${STREAM_BASE}${malId}/${currentEpisode}/${currentLanguage}`;
                playerIframe.src = src;
                nowPlayingLabel.textContent = `Now Playing: Ep ${currentEpisode} (${currentLanguage.toUpperCase()})`;
                episodeInfo.textContent = `Episode ${currentEpisode}${totalEpisodes?' / '+totalEpisodes:''}`;
                document.querySelectorAll('.ep-chip').forEach(chip => {
                    chip.classList.toggle('active', parseInt(chip.dataset.ep) === currentEpisode);
                });
                const animeImg = document.getElementById('animePosterImg')?.src || '';
                if (animeImg) ambientGlow.style.background =
                    `url(${animeImg}) center/cover no-repeat`;
            }

            function buildEpisodeSelector() {
                episodeSelector.innerHTML = '';
                const max = totalEpisodes || 12;
                for (let i = 1; i <= max; i++) {
                    const chip = document.createElement('button');
                    chip.className = 'ep-chip' + (i === currentEpisode ? ' active' : '');
                    chip.textContent = i;
                    chip.dataset.ep = i;
                    chip.addEventListener('click', () => { currentEpisode = i;
                        updateStream();
                        saveProgress(); });
                    episodeSelector.appendChild(chip);
                }
            }
            async function loadAnimeData() {
                const data = await fetchAPI('/anime/' + malId + '/full');
                if (!data || !data.data) return;
                const a = data.data;
                totalEpisodes = a.episodes || 0;
                animeTitleDisplay.textContent = a.title;
                animeDetailsLink.href = 'anime.html?id=' + malId;
                document.getElementById('animePosterImg')?.remove();
                const img = document.createElement('img');
                img.id = 'animePosterImg';
                img.src = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
                img.style.display = 'none';
                img.onload = () => { ambientGlow.style.background = `url(${img.src}) center/cover no-repeat`; };
                document.body.appendChild(img);
                buildEpisodeSelector();
                updateStream();
                const relations = await fetchAPI('/anime/' + malId + '/relations');
                if (relations?.data?.length) {
                    document.getElementById('relatedBar').style.display = 'flex';
                    const row = document.getElementById('relatedRow');
                    relations.data.slice(0, 8).forEach(r => {
                        const entry = r.entry?.[0];
                        if (entry) {
                            const a = document.createElement('a');
                            a.className = 'rec-thumb';
                            a.href = 'watch.html?id=' + entry.mal_id;
                            a.innerHTML =
                                `<img src="${entry.images?.jpg?.image_url||''}" alt="" loading="lazy"><span>${entry.name||''}</span>`;
                            row.appendChild(a);
                        }
                    });
                }
            }

            function saveProgress() {
                const history = JSON.parse(localStorage.getItem('nt_watch_history') || '{}');
                history[malId] = { ep: currentEpisode, lang: currentLanguage, ts: Date.now() };
                localStorage.setItem('nt_watch_history', JSON.stringify(history));
            }

            function loadProgress() {
                const history = JSON.parse(localStorage.getItem('nt_watch_history') || '{}');
                if (history[malId] && !params.get('ep')) {
                    currentEpisode = history[malId].ep || 1;
                    currentLanguage = history[malId].lang || 'sub';
                    languageSelect.value = currentLanguage;
                }
            }
            languageSelect.value = currentLanguage;
            languageSelect.addEventListener('change', () => { currentLanguage = languageSelect.value;
                updateStream();
                saveProgress(); });
            document.getElementById('autoNextBtn').addEventListener('click', function() {
                autoNext = !autoNext;
                this.classList.toggle('active-btn', autoNext);
                this.textContent = autoNext ? '⏹ Auto Next: ON' : '▶ Auto Next';
            });
            document.getElementById('cineToggle').addEventListener('click', function() {
                cineMode = !cineMode;
                this.classList.toggle('active-btn', cineMode);
                cineOverlay.classList.toggle('active', cineMode);
                document.getElementById('playerSection').style.boxShadow = cineMode ?
                    '0 0 80px rgba(0,0,0,0.9)' : '';
            });
            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                const el = document.getElementById('playerWrapper');
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'f' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                    document.getElementById('fullscreenBtn').click();
                }
                if (e.key === 'ArrowRight' && e.shiftKey) { currentEpisode = Math.min(currentEpisode + 1,
                        totalEpisodes || 999);
                    updateStream();
                    saveProgress(); }
                if (e.key === 'ArrowLeft' && e.shiftKey) { currentEpisode = Math.max(currentEpisode - 1, 1);
                    updateStream();
                    saveProgress(); }
            });
            window.addEventListener('message', e => {
                if (e.data === 'videoEnded' || e.data?.type === 'ended') {
                    if (autoNext && currentEpisode < (totalEpisodes || 999)) {
                        currentEpisode++;
                        updateStream();
                        saveProgress();
                    }
                }
            });
            const hamburger = document.getElementById('hamburgerBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            hamburger.addEventListener('click', () => { sidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden'; });
            document.getElementById('sidebarClose').addEventListener('click', () => { sidebar.classList.remove(
                    'active');
                overlay.classList.remove('active');
                document.body.style.overflow = ''; });
            overlay.addEventListener('click', () => { sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = ''; });
            loadProgress();
            loadAnimeData();
            updateStream();
        })();
    </script>
</body>
</html>
