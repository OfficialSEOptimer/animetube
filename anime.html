<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Details - NamiTube</title>
<meta name="description" content="Full anime information, characters, episodes and more on NamiTube.">
<link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#060610;--bg-secondary:#0a0a1a;--bg-card:rgba(15,15,35,0.85);--bg-glass:rgba(255,255,255,0.04);--accent:#7c3aed;--accent-light:#a855f7;--accent-glow:#c084fc;--neon:#e040fb;--text-primary:#f0f0ff;--text-secondary:#a0a0c0;--text-muted:#5a5a80;--border:rgba(124,58,237,0.2);--border-bright:rgba(168,85,247,0.4);--shadow-glow:0 0 40px rgba(124,58,237,0.3);--shadow-card:0 8px 32px rgba(0,0,0,0.6);--radius:12px;--radius-lg:20px;--header-h:70px;--transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100%;scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,0.1) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(224,64,251,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg-secondary)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,6,16,0.97) 0%,rgba(6,6,16,0.85) 100%);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:-1}
.header-left{display:flex;align-items:center;gap:16px}
.back-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);border:1px solid var(--border);background:var(--bg-glass);backdrop-filter:blur(10px);transition:var(--transition)}
.back-btn:hover{color:var(--text-primary);border-color:var(--border-bright)}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.header-logo img{height:32px}
.header-nav{display:flex;align-items:center;gap:4px}
.header-nav a{padding:8px 16px;border-radius:8px;font-size:0.9rem;font-weight:500;color:var(--text-secondary);transition:var(--transition)}
.header-nav a:hover{color:var(--text-primary)}
.header-right{display:flex;align-items:center;gap:12px}
.icon-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);border:1px solid var(--border);background:var(--bg-glass);transition:var(--transition);cursor:pointer}
.icon-btn:hover{color:var(--text-primary);border-color:var(--border-bright)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hamburger{width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:8px;border-radius:8px;transition:var(--transition)}
.hamburger span{display:block;height:2px;background:var(--text-primary);border-radius:2px;transition:var(--transition);transform-origin:center}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1100;opacity:0;pointer-events:none;transition:opacity 0.3s}
.sidebar-overlay.active{opacity:1;pointer-events:all}
.sidebar{position:fixed;top:0;left:0;height:100%;width:280px;background:linear-gradient(160deg,#0d0d24 0%,#080818 100%);border-right:1px solid var(--border);z-index:1200;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.sidebar.active{transform:translateX(0)}
.sidebar-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo img{height:32px}
.sidebar-close{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);background:var(--bg-glass);border:1px solid var(--border);cursor:pointer}
.sidebar-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar-nav{padding:24px 16px;flex:1}
.sidebar-nav a{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;color:var(--text-secondary);font-size:0.95rem;font-weight:500;margin-bottom:4px;transition:var(--transition)}
.sidebar-nav a:hover{background:rgba(124,58,237,0.15);color:var(--text-primary)}
.sidebar-nav a svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar-footer{padding:20px 24px;border-top:1px solid var(--border)}
.sidebar-footer p{font-size:0.75rem;color:var(--text-muted);line-height:1.5}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;z-index:2000;opacity:0;pointer-events:none;transition:opacity 0.3s}
.search-overlay.active{opacity:1;pointer-events:all}
.search-backdrop{position:absolute;inset:0;background:rgba(6,6,16,0.95);backdrop-filter:blur(20px)}
.search-container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:80px 24px 40px}
.search-close-btn{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);background:var(--bg-glass);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.search-close-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-input-wrap{position:relative;margin-bottom:24px}
.search-input-wrap svg{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:22px;height:22px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;height:64px;background:rgba(15,15,35,0.9);border:2px solid var(--border);border-radius:16px;padding:0 20px 0 56px;font-family:'Outfit',sans-serif;font-size:1.1rem;color:var(--text-primary);outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--accent-light);box-shadow:0 0 0 4px rgba(124,58,237,0.15)}
.search-input::placeholder{color:var(--text-muted)}
.search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:16px;max-height:60vh;overflow-y:auto}
.search-result-card{background:var(--bg-card);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.search-result-card:hover{transform:translateY(-4px);border-color:var(--border-bright)}
.search-result-card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.search-result-info{padding:8px 10px}
.search-result-info h4{font-size:0.82rem;font-weight:600;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.search-result-info p{font-size:0.75rem;color:var(--text-muted);margin-top:4px}
.search-empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.search-empty svg{width:48px;height:48px;stroke:var(--text-muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 16px}

/* ANIME BANNER */
.anime-banner{position:relative;width:100%;height:clamp(280px,40vw,500px);overflow:hidden;margin-top:0}
.anime-banner-bg{width:100%;height:100%;background-size:cover;background-position:center 20%;transition:transform 0.5s}
.anime-banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,6,16,0.3) 0%,rgba(6,6,16,0.7) 60%,var(--bg-primary) 100%),linear-gradient(to right,rgba(6,6,16,0.8) 0%,transparent 50%)}

/* ANIME PAGE LAYOUT */
.anime-page{padding:0 clamp(16px,4vw,60px) 60px;position:relative;z-index:1;margin-top:calc(var(--header-h) * -0.5)}
.anime-main{display:grid;grid-template-columns:220px 1fr;gap:40px;align-items:start}
.anime-poster{position:relative;border-radius:var(--radius-lg);overflow:hidden;border:2px solid var(--border-bright);box-shadow:var(--shadow-glow);flex-shrink:0;width:220px}
.anime-poster img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.anime-info{min-width:0}
.anime-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.badge{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.badge-status{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ade80}
.badge-status.FINISHED{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#818cf8}
.badge-status.NOT_YET_RELEASED{background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.3);color:#fbbf24}
.badge-format{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:var(--accent-light)}
.badge-score{background:rgba(250,204,21,0.15);border:1px solid rgba(250,204,21,0.3);color:#fbbf24}
.anime-title-en{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3.5vw,2.8rem);font-weight:900;line-height:1.1;margin-bottom:8px}
.anime-title-jp{font-size:0.9rem;color:var(--text-muted);margin-bottom:20px}
.anime-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;font-size:0.95rem;font-weight:600;background:linear-gradient(135deg,var(--accent) 0%,var(--neon) 100%);color:#fff;transition:var(--transition);position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--neon) 0%,var(--accent) 100%);opacity:0;transition:opacity 0.3s}
.btn-primary:hover::before{opacity:1}
.btn-primary span,.btn-primary svg{position:relative;z-index:1}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.5)}
.btn-primary svg{width:18px;height:18px;fill:currentColor}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:0.95rem;font-weight:600;border:1.5px solid var(--border-bright);color:var(--text-primary);background:var(--bg-glass);backdrop-filter:blur(10px);transition:var(--transition)}
.btn-outline:hover{background:rgba(124,58,237,0.15);border-color:var(--accent-light);transform:translateY(-2px)}
.btn-outline svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.anime-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:28px}
.stat-item{background:var(--bg-glass);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:var(--transition)}
.stat-item:hover{border-color:var(--border-bright);background:rgba(124,58,237,0.08)}
.stat-value{font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.stat-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}
.anime-synopsis h3{font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--text-primary)}
.anime-synopsis p{font-size:0.9rem;color:var(--text-secondary);line-height:1.8}
.read-more-btn{background:none;border:none;color:var(--accent-light);font-size:0.85rem;cursor:pointer;margin-top:8px;font-family:'Outfit',sans-serif;transition:var(--transition)}
.read-more-btn:hover{color:var(--accent-glow)}

/* SECTIONS */
.detail-section{margin-top:48px}
.detail-section-title{font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:20px;display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.detail-section-title::before{content:'';width:4px;height:18px;background:linear-gradient(to bottom,var(--accent),var(--neon));border-radius:2px}

/* GENRES */
.genre-tags{display:flex;flex-wrap:wrap;gap:8px}
.genre-tag{padding:6px 16px;border-radius:20px;font-size:0.8rem;font-weight:500;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);color:var(--accent-light);cursor:pointer;transition:var(--transition)}
.genre-tag:hover{background:rgba(124,58,237,0.25);border-color:var(--accent-light)}

/* TRAILER */
.trailer-wrap{position:relative;width:100%;max-width:800px;aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg-secondary);border:1px solid var(--border)}
.trailer-wrap iframe{width:100%;height:100%;border:none}
.trailer-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-muted)}
.trailer-placeholder svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* CHARACTERS */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.char-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition)}
.char-card:hover{border-color:var(--border-bright);transform:translateY(-4px)}
.char-img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top}
.char-info{padding:10px}
.char-name{font-size:0.82rem;font-weight:600;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.char-role{font-size:0.72rem;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}

/* RELATIONS & RECS */
.card-row-wrap{position:relative;overflow:hidden}
.card-row{display:flex;gap:14px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:8px;cursor:grab;user-select:none}
.card-row::-webkit-scrollbar{display:none}
.card-row.dragging{cursor:grabbing}
.anime-mini-card{flex-shrink:0;width:clamp(110px,16vw,150px);cursor:pointer;transition:var(--transition)}
.anime-mini-card:hover{transform:translateY(-5px)}
.mini-poster{position:relative;width:100%;aspect-ratio:2/3;border-radius:10px;overflow:hidden;background:var(--bg-secondary);border:1px solid var(--border)}
.mini-poster img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.anime-mini-card:hover .mini-poster img{transform:scale(1.06)}
.mini-info{padding:8px 2px}
.mini-title{font-size:0.78rem;font-weight:600;color:var(--text-primary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.mini-rel{font-size:0.68rem;color:var(--accent-light);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.row-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(6,6,16,0.9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);color:var(--text-primary)}
.row-nav:hover{background:rgba(124,58,237,0.5);border-color:var(--accent-light)}
.row-nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.row-prev{left:0}.row-next{right:0}

/* STAFF */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.staff-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:14px;transition:var(--transition)}
.staff-card:hover{border-color:var(--border-bright);background:rgba(124,58,237,0.08)}
.staff-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg-secondary)}
.staff-info{}
.staff-name{font-size:0.85rem;font-weight:600;color:var(--text-primary)}
.staff-role{font-size:0.75rem;color:var(--text-muted)}

/* RANKINGS */
.rankings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.rank-card{background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:var(--transition)}
.rank-card:hover{border-color:var(--border-bright)}
.rank-number{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.rank-context{font-size:0.78rem;color:var(--text-muted);margin-top:4px}

/* LOADING / SKELETON */
.skeleton{animation:pulse 1.5s infinite}
.skel-line{height:14px;border-radius:4px;background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 100%);background-size:200% 100%;margin-bottom:10px}
.skel-poster{width:220px;aspect-ratio:2/3;border-radius:var(--radius-lg);background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 100%);background-size:200% 100%}
@keyframes pulse{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ERROR */
.error-page{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:40px}
.error-page svg{width:64px;height:64px;stroke:var(--text-muted);fill:none;stroke-width:1.5}
.error-page h2{font-size:1.5rem;font-weight:700}
.error-page p{color:var(--text-muted);max-width:400px}

/* RESPONSIVE */
@media(max-width:768px){
  .anime-main{grid-template-columns:1fr;gap:24px}
  .anime-poster{width:160px;margin:0 auto}
  .anime-info{text-align:center}
  .anime-actions{justify-content:center}
  .char-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .staff-grid{grid-template-columns:1fr 1fr}
  .header-nav{display:none}
  .row-nav{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube"></div>
    <button class="sidebar-close" id="sidebarClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="sidebar-nav">
    <a href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>

<script>
'use strict';
const ANILIST_URL='https://graphql.anilist.co';
const CACHE_TTL=10*60*1000;
const RETRY_DELAYS=[500,1000,2000];

const Cache={
  get(k){try{const r=localStorage.getItem('nt_'+k);if(!r)return null;const{data,ts}=JSON.parse(r);if(Date.now()-ts>CACHE_TTL){localStorage.removeItem('nt_'+k);return null;}return data;}catch{return null;}},
  set(k,d){try{localStorage.setItem('nt_'+k,JSON.stringify({data:d,ts:Date.now()}));}catch{}}
};

async function gql(query,variables={},attempt=0){
  const key=btoa(JSON.stringify({query,variables})).slice(0,60);
  const cached=Cache.get(key);if(cached)return cached;
  try{
    const ctrl=new AbortController(),timeout=setTimeout(()=>ctrl.abort(),12000);
    const res=await fetch(ANILIST_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables}),signal:ctrl.signal});
    clearTimeout(timeout);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.errors)throw new Error(json.errors[0]?.message||'GraphQL error');
    Cache.set(key,json.data);return json.data;
  }catch(e){
    if(attempt<RETRY_DELAYS.length&&!e.message?.includes('abort')){await new Promise(r=>setTimeout(r,RETRY_DELAYS[attempt]));return gql(query,variables,attempt+1);}
    return null;
  }
}

// sidebar
const sidebar=document.getElementById('sidebar'),sidebarOverlay=document.getElementById('sidebarOverlay'),hamburgerBtn=document.getElementById('hamburgerBtn');
function openSidebar(){sidebar.classList.add('active');sidebarOverlay.classList.add('active');hamburgerBtn.classList.add('active');document.body.style.overflow='hidden';}
function closeSidebar(){sidebar.classList.remove('active');sidebarOverlay.classList.remove('active');hamburgerBtn.classList.remove('active');document.body.style.overflow='';}
hamburgerBtn.addEventListener('click',()=>sidebar.classList.contains('active')?closeSidebar():openSidebar());
sidebarOverlay.addEventListener('click',closeSidebar);
document.getElementById('sidebarClose').addEventListener('click',closeSidebar);

// search
const searchOverlay=document.getElementById('searchOverlay'),searchInput=document.getElementById('searchInput'),searchResults=document.getElementById('searchResults');
let searchDebounce=null;
document.getElementById('searchBtn').addEventListener('click',()=>{searchOverlay.classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>searchInput.focus(),100);});
document.getElementById('searchClose').addEventListener('click',()=>{searchOverlay.classList.remove('active');document.body.style.overflow='';});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){searchOverlay.classList.remove('active');document.body.style.overflow='';}});
searchInput.addEventListener('input',()=>{
  clearTimeout(searchDebounce);const q=searchInput.value.trim();if(!q)return;
  searchDebounce=setTimeout(async()=>{
    searchResults.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">Searching...</div>';
    const data=await gql(`query($s:String){Page(perPage:18){media(search:$s,type:ANIME,sort:POPULARITY_DESC){id title{romaji english}coverImage{large}averageScore format}}}`,{s:q});
    if(!data?.Page?.media?.length){searchResults.innerHTML='<div class="search-empty"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>No results</p></div>';return;}
    searchResults.innerHTML='';
    data.Page.media.forEach(a=>{
      const c=document.createElement('div');c.className='search-result-card';
      c.innerHTML=`<img src="${a.coverImage.large}" alt="" loading="lazy"><div class="search-result-info"><h4>${a.title.english||a.title.romaji}</h4><p>${a.format||''}</p></div>`;
      c.addEventListener('click',()=>{window.location.href='anime.html?id='+a.id;});
      searchResults.appendChild(c);
    });
  },400);
});

// slider helper
function initSlider(row){
  if(row._si)return;row._si=true;
  let isDown=false,sx=0,sl=0;
  row.addEventListener('mousedown',e=>{isDown=true;row.classList.add('dragging');sx=e.pageX-row.offsetLeft;sl=row.scrollLeft;});
  row.addEventListener('mouseleave',()=>{isDown=false;row.classList.remove('dragging');});
  window.addEventListener('mouseup',()=>{isDown=false;row.classList.remove('dragging');});
  row.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();row.scrollLeft=sl-(e.pageX-row.offsetLeft-sx)*1.5;});
  row.addEventListener('wheel',e=>{e.preventDefault();row.scrollLeft+=e.deltaY*2;},{passive:false});
  const w=row.closest('.card-row-wrap');
  if(w){
    const p=w.querySelector('.row-prev'),n=w.querySelector('.row-next');
    if(p)p.addEventListener('click',()=>{row.scrollLeft-=row.clientWidth*0.8;});
    if(n)n.addEventListener('click',()=>{row.scrollLeft+=row.clientWidth*0.8;});
  }
}

function renderMiniCard(a,rel){
  const card=document.createElement('div');card.className='anime-mini-card';
  const title=a.title.english||a.title.romaji;
  card.innerHTML=`<div class="mini-poster"><img src="${a.coverImage?.large||a.coverImage?.medium||''}" alt="${title}" loading="lazy"></div><div class="mini-info"><div class="mini-title">${title}</div>${rel?`<div class="mini-rel">${rel.replace(/_/g,' ')}</div>`:''}</div>`;
  card.addEventListener('click',()=>{window.location.href='anime.html?id='+a.id;});
  return card;
}

function makeSection(title,id,content){
  const sec=document.createElement('div');sec.className='detail-section';
  sec.innerHTML=`<h2 class="detail-section-title">${title}</h2>`;
  const inner=document.createElement('div');inner.id=id;
  inner.innerHTML=content||'';
  sec.appendChild(inner);
  return sec;
}

function makeRow(id){
  const w=document.createElement('div');w.className='card-row-wrap';
  w.innerHTML=`<button class="row-nav row-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="card-row" id="${id}"></div>
    <button class="row-nav row-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>`;
  return w;
}

async function loadAnime(){
  const params=new URLSearchParams(window.location.search);
  const id=parseInt(params.get('id'));
  const page=document.getElementById('animePage');
  if(!id){page.innerHTML='<div class="error-page"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h2>Invalid Anime ID</h2><p>Please go back and try again.</p><a href="index.html" class="btn-primary" style="margin-top:16px"><span>Go Home</span></a></div>';return;}

  const data=await gql(`
    query($id:Int){
      Media(id:$id,type:ANIME){
        id idMal title{romaji english native}description
        bannerImage coverImage{extraLarge large}
        averageScore meanScore popularity favourites
        format status episodes duration
        season seasonYear startDate{year month day} endDate{year month day}
        genres tags{name}
        studios(isMain:true){nodes{name}}
        trailer{id site}
        rankings{rank type context season year allTime}
        characters(sort:ROLE,perPage:16){nodes{id name{full}image{medium}gender age}}
        staff(perPage:12){nodes{id name{full}image{medium}} edges{role}}
        relations{nodes{id title{romaji english}coverImage{large medium}type}edges{relationType}}
        recommendations(sort:RATING_DESC,perPage:12){nodes{mediaRecommendation{id title{romaji english}coverImage{large medium}averageScore}}}
        externalLinks{site url type}
        nextAiringEpisode{episode airingAt}
      }
    }
  `,{id});

  if(!data?.Media){
    page.innerHTML='<div class="error-page"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h2>Anime Not Found</h2><p>We couldn\'t find this anime. Please check the ID or go back.</p><a href="index.html" class="btn-primary" style="margin-top:16px"><span>Go Home</span></a></div>';
    return;
  }

  const a=data.Media;
  const title=a.title.english||a.title.romaji;
  document.title=title+' - NamiTube';

  // Banner
  if(a.bannerImage){
    document.getElementById('bannerBg').style.backgroundImage=`url('${a.bannerImage}')`;
  } else {
    document.getElementById('animeBanner').style.height='var(--header-h)';
  }

  // Status badge class
  const statusClass=a.status==='RELEASING'?'RELEASING':a.status==='FINISHED'?'FINISHED':a.status==='NOT_YET_RELEASED'?'NOT_YET_RELEASED':'';
  const statusLabel=a.status?.replace(/_/g,' ')||'Unknown';

  // Score
  const score=a.averageScore?`${(a.averageScore/10).toFixed(1)}/10`:'N/A';

  // Synopsis
  const desc=(a.description||'').replace(/<[^>]*>/g,'');
  const shortDesc=desc.length>400?desc.slice(0,400)+'...':desc;

  // Season
  const season=a.season&&a.seasonYear?`${a.season.charAt(0)+a.season.slice(1).toLowerCase()} ${a.seasonYear}`:(a.startDate?.year||'Unknown');

  // Next ep
  let nextEpHtml='';
  if(a.nextAiringEpisode){
    const when=new Date(a.nextAiringEpisode.airingAt*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    nextEpHtml=`<div class="stat-item"><div class="stat-value" style="font-size:0.95rem">Ep ${a.nextAiringEpisode.episode}</div><div class="stat-label">Next: ${when}</div></div>`;
  }

  // Studios
  const studio=a.studios?.nodes?.[0]?.name||'Unknown';

  // Build page
  page.innerHTML=`
    <div class="anime-main">
      <div class="anime-poster">
        <img src="${a.coverImage.extraLarge||a.coverImage.large}" alt="${title}">
      </div>
      <div class="anime-info">
        <div class="anime-badges">
          <span class="badge badge-format">${(a.format||'').replace(/_/g,' ')}</span>
          <span class="badge badge-status ${statusClass}">${statusLabel}</span>
          ${a.averageScore?`<span class="badge badge-score">★ ${score}</span>`:''}
        </div>
        <h1 class="anime-title-en">${title}</h1>
        <p class="anime-title-jp">${a.title.romaji}${a.title.native?' / '+a.title.native:''}</p>
        <div class="anime-stats">
          <div class="stat-item"><div class="stat-value">${score}</div><div class="stat-label">Rating</div></div>
          <div class="stat-item"><div class="stat-value">${a.episodes||'?'}</div><div class="stat-label">Episodes</div></div>
          <div class="stat-item"><div class="stat-value">${a.duration?a.duration+'m':'N/A'}</div><div class="stat-label">Duration</div></div>
          <div class="stat-item"><div class="stat-value">${(a.popularity||0).toLocaleString()}</div><div class="stat-label">Popularity</div></div>
          <div class="stat-item"><div class="stat-value" style="font-size:0.85rem">${season}</div><div class="stat-label">Season</div></div>
          <div class="stat-item"><div class="stat-value" style="font-size:0.85rem">${studio}</div><div class="stat-label">Studio</div></div>
          ${nextEpHtml}
        </div>
        <div class="anime-actions">
          <a href="watch.html?id=${a.id}&ep=1" class="btn-primary"><svg viewBox="0 0 24 24" style="fill:#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>Watch Now</span></a>
          ${a.episodes>1?`<a href="watch.html?id=${a.id}&ep=2" class="btn-outline"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span>Episodes</span></a>`:''}
        </div>
        <div class="anime-synopsis">
          <h3>Synopsis</h3>
          <p id="synopsisText">${shortDesc}</p>
          ${desc.length>400?`<button class="read-more-btn" id="readMoreBtn">Read More</button>`:''}
        </div>
      </div>
    </div>
  `;

  // Read more
  const rmBtn=document.getElementById('readMoreBtn');
  if(rmBtn){
    let expanded=false;
    rmBtn.addEventListener('click',()=>{
      expanded=!expanded;
      document.getElementById('synopsisText').textContent=expanded?desc:shortDesc;
      rmBtn.textContent=expanded?'Show Less':'Read More';
    });
  }

  const container=document.getElementById('animePage');

  // Genres
  if(a.genres?.length){
    const sec=makeSection('Genres','genreList');
    const gl=sec.querySelector('#genreList');
    gl.className='genre-tags';
    a.genres.forEach(g=>{
      const btn=document.createElement('a');btn.className='genre-tag';btn.textContent=g;btn.href=`discover.html?genre=${encodeURIComponent(g)}`;
      gl.appendChild(btn);
    });
    container.appendChild(sec);
  }

  // Trailer
  if(a.trailer?.id&&a.trailer.site==='youtube'){
    const sec=makeSection('Trailer','trailerWrap');
    const tw=sec.querySelector('#trailerWrap');
    tw.className='trailer-wrap';
    tw.innerHTML=`<iframe src="https://www.youtube.com/embed/${a.trailer.id}?rel=0" allowfullscreen loading="lazy" title="Trailer"></iframe>`;
    container.appendChild(sec);
  }

  // Characters
  if(a.characters?.nodes?.length){
    const sec=makeSection('Characters','charGrid');
    const cg=sec.querySelector('#charGrid');
    cg.className='char-grid';
    a.characters.nodes.forEach(ch=>{
      const c=document.createElement('div');c.className='char-card';
      c.innerHTML=`<img class="char-img" src="${ch.image?.medium||''}" alt="${ch.name.full}" loading="lazy"><div class="char-info"><div class="char-name">${ch.name.full}</div><div class="char-role">${ch.gender||''}</div></div>`;
      cg.appendChild(c);
    });
    container.appendChild(sec);
  }

  // Staff
  if(a.staff?.nodes?.length){
    const sec=makeSection('Staff','staffGrid');
    const sg=sec.querySelector('#staffGrid');
    sg.className='staff-grid';
    a.staff.nodes.forEach((s,i)=>{
      const role=a.staff.edges[i]?.role||'';
      const c=document.createElement('div');c.className='staff-card';
      c.innerHTML=`<img class="staff-avatar" src="${s.image?.medium||''}" alt="${s.name.full}" loading="lazy"><div class="staff-info"><div class="staff-name">${s.name.full}</div><div class="staff-role">${role}</div></div>`;
      sg.appendChild(c);
    });
    container.appendChild(sec);
  }

  // Rankings
  if(a.rankings?.length){
    const allTime=a.rankings.filter(r=>r.allTime).slice(0,4);
    if(allTime.length){
      const sec=makeSection('Rankings','rankGrid');
      const rg=sec.querySelector('#rankGrid');
      rg.className='rankings-grid';
      allTime.forEach(r=>{
        const c=document.createElement('div');c.className='rank-card';
        c.innerHTML=`<div class="rank-number">#${r.rank}</div><div class="rank-context">${r.context?.replace(/\b\w/g,l=>l.toUpperCase())||''}</div>`;
        rg.appendChild(c);
      });
      container.appendChild(sec);
    }
  }

  // Relations
  if(a.relations?.nodes?.length){
    const sec=makeSection('Relations','');
    const row=makeRow('relRow');
    sec.appendChild(row);
    container.appendChild(sec);
    const relRow=document.getElementById('relRow');
    a.relations.nodes.forEach((n,i)=>{
      const rel=a.relations.edges[i]?.relationType;
      relRow.appendChild(renderMiniCard(n,rel));
    });
    initSlider(relRow);
  }

  // Recommendations
  if(a.recommendations?.nodes?.length){
    const valid=a.recommendations.nodes.filter(n=>n.mediaRecommendation);
    if(valid.length){
      const sec=makeSection('You May Also Like','');
      const row=makeRow('recRow');
      sec.appendChild(row);
      container.appendChild(sec);
      const recRow=document.getElementById('recRow');
      valid.forEach(n=>recRow.appendChild(renderMiniCard(n.mediaRecommendation,null)));
      initSlider(recRow);
    }
  }
}

document.addEventListener('DOMContentLoaded',loadAnime);
</script>
