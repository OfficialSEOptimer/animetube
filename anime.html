<!-- anime.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NamiTube - Premium Detail Showcase</title>
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <style>
    :root {
      --bg-base: #07050d;
      --bg-surface: rgba(20, 15, 35, 0.65);
      --bg-surface-solid: #120e22;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-glow: rgba(139, 92, 246, 0.15);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-stack);
      overflow-x: hidden;
      max-width: 100%;
    }
    a { color: inherit; text-decoration: none; }
    button { background: none; border: none; font-family: inherit; color: inherit; cursor: pointer; }

    .container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 2rem; }
    @media (max-width: 768px) { .container { padding: 0 1rem; } }

    /* HEADER & SEARCH BAR PRESERVED FROM HOME */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      z-index: 1000;
      background: rgba(7, 5, 13, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      transition: var(--transition-smooth);
    }
    header.scrolled { background: rgba(7, 5, 13, 0.95); height: 60px; }
    .header-inner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .header-logo img { height: 40px; }
    .header-nav { display: flex; align-items: center; gap: 2rem; }
    @media (max-width: 1024px) { .header-nav { display: none; } }
    .nav-link { font-size: 0.95rem; font-weight: 500; opacity: 0.8; transition: var(--transition-smooth); }
    .nav-link:hover { opacity: 1; color: var(--accent); }

    /* CINEMATIC HERO BLOCK */
    .detail-backdrop {
      width: 100%;
      height: 50vh;
      min-height: 350px;
      position: relative;
      background-size: cover;
      background-position: center;
    }
    .backdrop-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(7,5,13,0) 0%, var(--bg-base) 100%),
                  rgba(7,5,13,0.4);
    }
    
    .detail-profile {
      position: relative;
      margin-top: -150px;
      z-index: 10;
      display: flex;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .detail-profile { flex-direction: column; align-items: center; text-align: center; }
    }
    
    .profile-poster {
      flex: 0 0 240px;
      width: 240px;
      aspect-ratio: 2/3;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      border: 1px solid var(--border-glow);
    }
    .profile-poster img { width: 100%; height: 100%; object-fit: cover; }
    
    .profile-text {
      flex: 1;
      padding-top: 100px;
    }
    @media (max-width: 768px) { .profile-text { padding-top: 0; } }
    
    .profile-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .profile-title-native {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .profile-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; }
    @media (max-width: 768px) { .profile-meta { justify-content: center; } }
    
    .badge {
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      font-weight: 600;
    }
    .badge.accent { background: var(--accent); color: #fff; border-color: transparent; }

    /* LAYOUT SPLIT GRID */
    .detail-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
      margin-top: 3rem;
    }
    @media (max-width: 992px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
    
    /* SIDEBAR METADATA */
    .sidebar-block {
      background: var(--bg-surface);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .meta-item-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem;}
    .meta-item-value { font-size: 1rem; font-weight: 600; }

    /* MAIN PANEL */
    .main-panel { display: flex; flex-direction: column; gap: 3rem; }
    
    .info-section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-glow);
      padding-bottom: 0.5rem;
    }
    .synopsis { font-size: 1.05rem; line-height: 1.8; color: var(--text-muted); }
    
    /* CHARACTER ROW GRID */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    .char-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      overflow: hidden;
      transition: var(--transition-smooth);
    }
    .char-card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .char-img { aspect-ratio: 1; overflow: hidden; }
    .char-img img { width: 100%; height: 100%; object-fit: cover; }
    .char-info { padding: 8px; text-align: center; }
    .char-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .char-role { font-size: 0.75rem; color: var(--text-muted); }

    /* TRAILER INTEGRATION */
    .trailer-box {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .trailer-box iframe { width: 100%; height: 100%; border: none; }

    /* BUTTON ACTION */
    .watch-action {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      padding: 16px 36px;
      background: var(--accent);
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: 0 8px 24px var(--accent-glow);
      transition: var(--transition-smooth);
      margin-bottom: 2rem;
    }
    .watch-action:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(139, 92, 246, 0.6);
    }

    /* Skeleton details */
    .skeleton { background: rgba(255,255,255,0.05); border-radius: 8px; animation: pulse 1.5s infinite ease-in-out; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.9; } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="header-logo">
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube">
        </a>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="discover.html" class="nav-link">Discover</a>
        <a href="schedule.html" class="nav-link">Schedule</a>
        <a href="donate.html" class="nav-link">Donate</a>
      </nav>
    </div>
  </header>

  <!-- MOUNT LOAD TARGET -->
  <div id="loading-view" class="container" style="padding-top: 150px; text-align: center;">
    <div style="font-size: 1.2rem; color: var(--text-muted);">Fetching dynamic metadata...</div>
  </div>

  <div id="detail-view" style="display: none; padding-bottom: 5rem;">
    <!-- DYNAMICALLY INJECTED CONTENT -->
  </div>

  <script>
    const ANILIST_ENDPOINT = 'https://graphql.anilist.co';

    async function fetchAniList(query, variables = {}) {
      const response = await fetch(ANILIST_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      const resData = await response.json();
      if (!response.ok) throw new Error(resData.errors?.[0]?.message || 'GraphQL failed');
      return resData.data;
    }

    const detailQuery = `
      query($id: Int) {
        Media(id: $id, type: ANIME) {
          id
          title { romaji english native }
          coverImage { extraLarge }
          bannerImage
          averageScore
          episodes
          seasonYear
          season
          format
          status
          genres
          duration
          description
          trailer { site id }
          studios(isMain: true) { nodes { name } }
          characters(role: MAIN, sort: ROLE) {
            edges {
              role
              node {
                id
                name { full }
                image { large }
              }
            }
          }
          recommendations(page: 1, perPage: 6) {
            nodes {
              mediaRecommendation {
                id
                title { romaji }
                coverImage { large }
                averageScore
              }
            }
          }
        }
      }
    `;

    async function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const mediaId = parseInt(params.get('id'), 10);
      
      if (!mediaId) {
        document.getElementById('loading-view').innerHTML = '<h2>Error: No Anime ID specified.</h2><p><a href="index.html">Return to Home</a></p>';
        return;
      }

      try {
        const data = await fetchAniList(detailQuery, { id: mediaId });
        const media = data.Media;
        
        document.title = `${media.title.romaji} - NamiTube`;
        
        const bannerImg = media.bannerImage || media.coverImage.extraLarge;
        const score = media.averageScore ? (media.averageScore / 10).toFixed(1) : 'N/A';
        const cleanDesc = media.description || 'No description available.';
        const mainStudio = media.studios.nodes[0]?.name || 'Unknown Studio';

        const mainHTML = `
          <div class="detail-backdrop" style="background-image: url('${bannerImg}')">
            <div class="backdrop-overlay"></div>
          </div>
          
          <div class="container">
            <div class="detail-profile">
              <div class="profile-poster">
                <img src="${media.coverImage.extraLarge}" alt="${media.title.romaji}">
              </div>
              <div class="profile-text">
                <div class="profile-meta">
                  <span class="badge accent">${score} ★</span>
                  <span class="badge">${media.format}</span>
                  <span class="badge">${media.status}</span>
                  <span class="badge">${media.seasonYear || ''} ${media.season || ''}</span>
                </div>
                <h1 class="profile-title">${media.title.english || media.title.romaji}</h1>
                <p class="profile-title-native">${media.title.native || ''}</p>
                
                <a href="watch.html?id=${media.id}&ep=1" class="watch-action">
                  <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                  Stream Episode 1
                </a>
              </div>
            </div>

            <div class="detail-grid">
              <aside class="sidebar-block">
                <div>
                  <div class="meta-item-title">Format</div>
                  <div class="meta-item-value">${media.format}</div>
                </div>
                <div>
                  <div class="meta-item-title">Episodes</div>
                  <div class="meta-item-value">${media.episodes || 'Airing'}</div>
                </div>
                <div>
                  <div class="meta-item-title">Duration</div>
                  <div class="meta-item-value">${media.duration ? `${media.duration} mins` : 'N/A'}</div>
                </div>
                <div>
                  <div class="meta-item-title">Status</div>
                  <div class="meta-item-value">${media.status}</div>
                </div>
                <div>
                  <div class="meta-item-title">Studio</div>
                  <div class="meta-item-value">${mainStudio}</div>
                </div>
                <div>
                  <div class="meta-item-title">Genres</div>
                  <div class="meta-item-value" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">
                    ${media.genres.map(g => `<span class="badge" style="font-size:0.75rem; padding:3px 8px;">${g}</span>`).join('')}
                  </div>
                </div>
              </aside>

              <div class="main-panel">
                <section>
                  <h2 class="info-section-title">Synopsis</h2>
                  <div class="synopsis">${cleanDesc}</div>
                </section>

                ${media.trailer && media.trailer.site === 'youtube' ? `
                  <section>
                    <h2 class="info-section-title">Official Trailer</h2>
                    <div class="trailer-box">
                      <iframe src="https://www.youtube.com/embed/${media.trailer.id}" allowfullscreen></iframe>
                    </div>
                  </section>
                ` : ''}

                ${media.characters.edges.length ? `
                  <section>
                    <h2 class="info-section-title">Main Characters</h2>
                    <div class="char-grid">
                      ${media.characters.edges.map(edge => `
                        <div class="char-card">
                          <div class="char-img">
                            <img src="${edge.node.image.large}" alt="${edge.node.name.full}" loading="lazy">
                          </div>
                          <div class="char-info">
                            <div class="char-name">${edge.node.name.full}</div>
                            <div class="char-role">${edge.role}</div>
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  </section>
                ` : ''}
              </div>
            </div>
          </div>
        `;

        document.getElementById('loading-view').style.display = 'none';
        const dView = document.getElementById('detail-view');
        dView.innerHTML = mainHTML;
        dView.style.display = 'block';

      } catch (err) {
        console.error(err);
        document.getElementById('loading-view').innerHTML = `<h2>Failed to load details</h2><p>${err.message}</p>`;
      }
    }

    loadDetail();
  </script>
</body>
</html>
