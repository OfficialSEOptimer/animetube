<style>
:root{
  --bg:#05050f;--bg2:#0a0a1a;--bg3:#0f0f22;
  --card:#12122a;--card2:#1a1a35;
  --purple:#7c3aed;--purple2:#9d5cff;--purple3:#c084fc;
  --glow:rgba(124,58,237,0.4);
  --text:#f0f0ff;--text2:#a0a0c0;--text3:#606080;
  --gold:#f59e0b;--green:#10b981;--red:#ef4444;
  --header-h:64px;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:4px;}

/* HEADER */
#header{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  height:var(--header-h);
  background:linear-gradient(to bottom,rgba(5,5,15,0.97),rgba(5,5,15,0.8));
  backdrop-filter:blur(20px);border-bottom:1px solid rgba(124,58,237,0.15);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;
}
.h-left,.h-right{display:flex;align-items:center;gap:12px;min-width:48px;}
.h-center{flex:1;display:flex;justify-content:center;}
#logo{height:38px;max-width:200px;object-fit:contain;cursor:pointer;}
.icon-btn{width:40px;height:40px;border:none;background:rgba(124,58,237,0.12);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all 0.2s;}
.icon-btn:hover{background:rgba(124,58,237,0.3);color:var(--purple3);}
.icon-btn svg{width:18px;height:18px;}
#desk-nav{display:flex;align-items:center;gap:4px;}
#desk-nav a{color:var(--text2);text-decoration:none;font-family:'Syne',sans-serif;font-weight:600;font-size:0.82rem;letter-spacing:0.04em;text-transform:uppercase;padding:6px 14px;border-radius:8px;transition:all 0.2s;}
#desk-nav a:hover{color:var(--purple3);background:rgba(124,58,237,0.12);}

/* SIDEBAR */
#overlay{position:fixed;inset:0;z-index:1500;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
#overlay.open{opacity:1;pointer-events:all;}
#sidebar{position:fixed;top:0;left:0;bottom:0;z-index:1600;width:280px;max-width:80vw;background:linear-gradient(160deg,#0a0a1e 0%,#12122a 100%);border-right:1px solid rgba(124,58,237,0.2);transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);padding:0 0 24px;overflow-y:auto;}
#sidebar.open{transform:translateX(0);}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid rgba(124,58,237,0.1);height:var(--header-h);}
.sb-logo{height:32px;object-fit:contain;}
.sb-close{width:36px;height:36px;border:none;background:rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.sb-nav{padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
.sb-nav a{display:flex;align-items:center;gap:12px;color:var(--text2);text-decoration:none;font-family:'Syne',sans-serif;font-weight:600;font-size:0.9rem;letter-spacing:0.04em;text-transform:uppercase;padding:12px 16px;border-radius:10px;transition:all 0.2s;}
.sb-nav a:hover{color:var(--purple3);background:rgba(124,58,237,0.12);}

/* SEARCH OVERLAY */
#search-overlay{position:fixed;inset:0;z-index:2000;background:rgba(5,5,15,0.96);backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity 0.3s;display:flex;flex-direction:column;}
#search-overlay.open{opacity:1;pointer-events:all;}
.so-header{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid rgba(124,58,237,0.15);}
.so-input{flex:1;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.25);border-radius:12px;padding:12px 16px;color:var(--text);font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.so-input:focus{border-color:var(--purple2);}
.so-close{width:40px;height:40px;border:none;background:rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.so-results{flex:1;overflow-y:auto;padding:16px 24px;}
.so-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.so-card{cursor:pointer;text-decoration:none;display:block;border-radius:10px;overflow:hidden;background:var(--card);transition:transform 0.2s;}
.so-card:hover{transform:scale(1.04);}
.so-card-img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.so-card-info{padding:6px 8px;}
.so-card-title{font-size:0.72rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.so-empty{color:var(--text3);text-align:center;padding:40px 0;font-size:0.9rem;}

/* BANNER */
#detail-banner{
  position:relative;width:100%;height:clamp(260px,45vw,480px);
  margin-top:var(--header-h);overflow:hidden;
}
#detail-banner-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;}
#detail-banner-grad{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(5,5,15,0.4) 60%,transparent 100%),
              linear-gradient(to right,var(--bg) 0%,transparent 40%);
}

/* DETAIL LAYOUT */
#detail-main{
  display:grid;
  grid-template-columns:clamp(140px,22vw,220px) 1fr;
  gap:24px;padding:0 24px 32px;max-width:1400px;margin:0 auto;
  margin-top:calc(-80px);position:relative;z-index:2;
}
#detail-poster{
  width:100%;aspect-ratio:3/4;border-radius:16px;
  object-fit:cover;box-shadow:0 12px 40px rgba(0,0,0,0.6);
  background:var(--card2);flex-shrink:0;
}
#detail-info{padding-top:8px;}
#detail-title{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:800;line-height:1.15;margin-bottom:8px;}
#detail-title-native{font-size:0.85rem;color:var(--text3);margin-bottom:12px;}
.detail-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.d-badge{padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:600;font-family:'Syne',sans-serif;letter-spacing:0.05em;text-transform:uppercase;}
.d-badge-score{background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.4);color:var(--gold);}
.d-badge-status{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);color:var(--green);}
.d-badge-format{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);color:var(--purple3);}
.d-badge-ep{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text2);}
.detail-btns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.btn-primary{display:inline-flex;align-items:center;gap:7px;background:var(--purple);color:#fff;padding:11px 22px;border-radius:10px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.04em;border:none;cursor:pointer;box-shadow:0 0 24px rgba(124,58,237,0.5);transition:all 0.25s;}
.btn-primary:hover{background:var(--purple2);box-shadow:0 0 32px rgba(124,58,237,0.7);}
.btn-secondary{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);color:var(--text);padding:11px 22px;border-radius:10px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.04em;border:1px solid rgba(255,255,255,0.12);cursor:pointer;transition:all 0.25s;}
.btn-secondary:hover{background:rgba(255,255,255,0.16);}
#detail-synopsis{font-size:0.875rem;color:var(--text2);line-height:1.7;max-width:700px;margin-bottom:20px;}
#detail-synopsis.collapsed{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
#synopsis-toggle{background:none;border:none;color:var(--purple3);cursor:pointer;font-size:0.8rem;font-family:'Syne',sans-serif;font-weight:600;padding:0;margin-top:4px;}

/* META GRID */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.meta-item{background:rgba(124,58,237,0.05);border:1px solid rgba(124,58,237,0.1);border-radius:10px;padding:10px 12px;}
.meta-label{font-size:0.62rem;color:var(--text3);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
.meta-value{font-size:0.82rem;color:var(--text2);font-weight:500;}

/* TABS */
.tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:20px;background:rgba(255,255,255,0.03);border-radius:12px;padding:4px;}
.tab{padding:8px 16px;border-radius:9px;border:none;background:transparent;color:var(--text3);font-family:'Syne',sans-serif;font-weight:600;font-size:0.78rem;letter-spacing:0.04em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.tab.active{background:var(--purple);color:#fff;box-shadow:0 0 16px rgba(124,58,237,0.4);}
.tab:hover:not(.active){color:var(--text2);background:rgba(255,255,255,0.05);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* EPISODES */
.ep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ep-count{font-size:0.8rem;color:var(--text3);}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px;}
.ep-btn{
  padding:10px 6px;border-radius:8px;border:1px solid rgba(124,58,237,0.2);
  background:rgba(124,58,237,0.05);color:var(--text2);font-size:0.78rem;
  font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;
  text-decoration:none;display:block;
}
.ep-btn:hover{background:rgba(124,58,237,0.2);color:var(--purple3);border-color:var(--purple2);}

/* CHARACTERS GRID */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.char-card{background:var(--card);border-radius:10px;overflow:hidden;display:flex;align-items:center;gap:10px;padding:8px;transition:background 0.2s;}
.char-card:hover{background:var(--card2);}
.char-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card2);}
.char-name{font-size:0.75rem;color:var(--text);font-weight:500;line-height:1.3;}
.char-role{font-size:0.62rem;color:var(--text3);}

/* STAFF GRID */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.staff-card{background:var(--card);border-radius:10px;overflow:hidden;display:flex;align-items:center;gap:10px;padding:8px;}
.staff-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--card2);}
.staff-name{font-size:0.75rem;color:var(--text);font-weight:500;}
.staff-role{font-size:0.62rem;color:var(--text3);}

/* RECOMMENDATIONS */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.rec-card{text-decoration:none;border-radius:10px;overflow:hidden;background:var(--card);display:block;transition:transform 0.2s;}
.rec-card:hover{transform:scale(1.05);}
.rec-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--card2);}
.rec-title{padding:6px 8px;font-size:0.72rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* RELATIONS */
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.rel-card{text-decoration:none;background:var(--card);border-radius:10px;overflow:hidden;display:flex;gap:10px;align-items:center;padding:8px;transition:background 0.2s;}
.rel-card:hover{background:var(--card2);}
.rel-img{width:48px;height:64px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--card2);}
.rel-info{min-width:0;}
.rel-type{font-size:0.62rem;color:var(--purple3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}
.rel-title{font-size:0.75rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rel-format{font-size:0.62rem;color:var(--text3);}

/* SKEL */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* SECTION WRAP */
.detail-section{max-width:1400px;margin:0 auto;padding:0 24px;}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid rgba(124,58,237,0.1);padding:24px;text-align:center;margin-top:40px;}
.footer-copy{font-size:0.72rem;color:var(--text3);margin-bottom:8px;}
.footer-disc{font-size:0.65rem;color:var(--text3);opacity:0.6;max-width:600px;margin:0 auto;line-height:1.6;}

/* TRAILER MODAL */
#trailer-modal{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#trailer-modal.open{opacity:1;pointer-events:all;}
.trailer-wrap{position:relative;width:min(90vw,900px);aspect-ratio:16/9;}
.trailer-wrap iframe{width:100%;height:100%;border:none;border-radius:12px;}
.trailer-close{position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}

@media(max-width:768px){
  #desk-nav{display:none;}
  #detail-main{grid-template-columns:clamp(110px,35vw,150px) 1fr;gap:14px;padding:0 14px 24px;margin-top:-50px;}
  #detail-title{font-size:1.2rem;}
  .meta-grid{grid-template-columns:repeat(2,1fr);}
  .detail-section{padding:0 14px;}
  .char-grid,.staff-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
}
@media(min-width:769px){#burger{display:none;}}
@media(max-width:480px){
  #detail-main{grid-template-columns:100px 1fr;gap:10px;}
  .tabs{overflow-x:auto;flex-wrap:nowrap;padding:4px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
}
</style>
</head>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="episodes">Episodes</button>
    <button class="tab" data-tab="characters">Characters</button>
    <button class="tab" data-tab="staff">Staff</button>
    <button class="tab" data-tab="relations">Relations</button>
    <button class="tab" data-tab="recommendations">More Like This</button>
  </div>

  <div class="tab-content active" id="tab-episodes">
    <div class="ep-header"><span id="ep-count" class="ep-count"></span></div>
    <div class="ep-grid" id="ep-grid"></div>
  </div>
  <div class="tab-content" id="tab-characters">
    <div class="char-grid" id="char-grid"></div>
  </div>
  <div class="tab-content" id="tab-staff">
    <div class="staff-grid" id="staff-grid"></div>
  </div>
  <div class="tab-content" id="tab-relations">
    <div class="rel-grid" id="rel-grid"></div>
  </div>
  <div class="tab-content" id="tab-recommendations">
    <div class="rec-grid" id="rec-grid"></div>
  </div>
</div>

<footer>
  <p class="footer-copy">© 2025 NamiTube. All rights reserved.</p>
  <p class="footer-disc">This site does not store any files on its server. All contents are provided by non-affiliated third parties.</p>
</footer>

<script>
'use strict';
const ANILIST='https://graphql.anilist.co';
const CACHE={};
const CACHE_TTL=5*60*1000;

function cacheGet(k){try{const d=localStorage.getItem('nt_'+k);if(!d)return null;const p=JSON.parse(d);if(Date.now()-p.t>CACHE_TTL)return null;return p.v;}catch{return null;}}
function cacheSet(k,v){try{localStorage.setItem('nt_'+k,JSON.stringify({t:Date.now(),v}));}catch{}}

async function gql(query,variables={},retries=3){
  const key=JSON.stringify({query,variables});
  if(CACHE[key]&&Date.now()-CACHE[key].t<CACHE_TTL)return CACHE[key].v;
  for(let i=0;i<retries;i++){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),12000);
      const r=await fetch(ANILIST,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({query,variables}),signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();
      if(d.errors)throw new Error(d.errors[0].message);
      CACHE[key]={t:Date.now(),v:d.data};
      return d.data;
    }catch(e){if(i===retries-1)throw e;await new Promise(r=>setTimeout(r,800*(i+1)));}
  }
}

function getParam(k){return new URLSearchParams(location.search).get(k);}

async function loadAnime(){
  const id=getParam('id');
  if(!id){document.getElementById('detail-title').textContent='Anime not found';return;}
  try{
    const data=await gql(`query($id:Int){Media(id:$id,type:ANIME){
      id title{english romaji native} bannerImage coverImage{extraLarge large}
      description(asHtml:false) genres tags{name} averageScore popularity
      episodes duration format status season seasonYear startDate{year month day}
      endDate{year month day} studios{nodes{name isAnimationStudio}} source
      trailer{id site} rankings{rank type allTime season year}
      characters(sort:ROLE,perPage:20){nodes{id name{full} image{medium} gender age} edges{role}}
      staff(sort:ROLE,perPage:16){nodes{id name{full} image{medium}} edges{role}}
      relations{nodes{id title{english romaji} coverImage{medium} format} edges{relationType}}
      recommendations(sort:RATING_DESC,perPage:12){nodes{mediaRecommendation{id title{english romaji} coverImage{medium}}}}
      nextAiringEpisode{episode airingAt} streamingEpisodes{title thumbnail}
    }}`,{id:+id});
    const m=data?.Media;
    if(!m){document.getElementById('detail-title').textContent='Anime not found';return;}
    render(m);
  }catch(e){
    document.getElementById('detail-title').textContent='Failed to load anime.';
    console.error(e);
  }
}

function render(m){
  document.title=`${m.title?.english||m.title?.romaji||'Anime'} — NamiTube`;
  // Banner
  if(m.bannerImage){
    document.getElementById('detail-banner-img').src=m.bannerImage;
    document.getElementById('detail-banner-img').alt=m.title?.english||m.title?.romaji||'';
  } else {
    document.getElementById('detail-banner').style.background='linear-gradient(to bottom,var(--card2),var(--bg))';
    document.getElementById('detail-banner').style.height='200px';
  }
  // Poster
  const poster=document.getElementById('detail-poster');
  poster.src=m.coverImage?.extraLarge||m.coverImage?.large||'';
  poster.alt=m.title?.english||m.title?.romaji||'';
  poster.onerror=()=>{poster.style.background='var(--card2)';};
  // Title
  const titleEl=document.getElementById('detail-title');
  titleEl.className='';titleEl.textContent=m.title?.english||m.title?.romaji||'Unknown';
  if(m.title?.native) document.getElementById('detail-title-native').textContent=m.title.native;
  // Badges
  const badges=document.getElementById('detail-badges');
  const score=m.averageScore?(m.averageScore/10).toFixed(1):null;
  badges.innerHTML=[
    score?`<span class="d-badge d-badge-score">★ ${score}</span>`:'',
    m.status?`<span class="d-badge d-badge-status">${m.status}</span>`:'',
    m.format?`<span class="d-badge d-badge-format">${m.format}</span>`:'',
    m.episodes?`<span class="d-badge d-badge-ep">${m.episodes} EPS</span>`:'',
    m.duration?`<span class="d-badge d-badge-ep">${m.duration}min</span>`:'',
  ].join('');
  // Buttons
  const btns=document.getElementById('detail-btns');
  btns.innerHTML=`
    <a href="watch.html?id=${m.id}&ep=1" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Watch Now
    </a>
    ${m.trailer?.id&&m.trailer?.site==='youtube'?`
    <button class="btn-secondary" onclick="openTrailer('${m.trailer.id}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Trailer
    </button>`:''}
  `;
  // Synopsis
  const synEl=document.getElementById('detail-synopsis');
  const synText=(m.description||'No synopsis available.').replace(/<[^>]+>/g,'');
  synEl.textContent=synText;
  const toggle=document.getElementById('synopsis-toggle');
  if(synText.length>400){
    toggle.style.display='block';
    synEl.classList.add('collapsed');
    toggle.addEventListener('click',()=>{
      synEl.classList.toggle('collapsed');
      toggle.textContent=synEl.classList.contains('collapsed')?'Show more':'Show less';
    });
  }
  // Meta
  const meta=document.getElementById('meta-grid');
  const studio=m.studios?.nodes?.find(s=>s.isAnimationStudio)?.name||m.studios?.nodes?.[0]?.name||'N/A';
  const start=m.startDate?.year?`${m.startDate.year}`:'N/A';
  meta.innerHTML=[
    {l:'Score',v:score?`⭐ ${score}/10`:'N/A'},
    {l:'Status',v:m.status||'N/A'},
    {l:'Episodes',v:m.episodes||'N/A'},
    {l:'Duration',v:m.duration?`${m.duration} min`:'N/A'},
    {l:'Format',v:m.format||'N/A'},
    {l:'Season',v:m.season?`${m.season} ${m.seasonYear||''}`:'N/A'},
    {l:'Year',v:start},
    {l:'Source',v:m.source||'N/A'},
    {l:'Studio',v:studio},
    {l:'Popularity',v:m.popularity?`#${m.popularity.toLocaleString()}`:'N/A'},
  ].map(x=>`<div class="meta-item"><div class="meta-label">${x.l}</div><div class="meta-value">${x.v}</div></div>`).join('');

  // Episodes
  const epGrid=document.getElementById('ep-grid');
  const epCount=m.episodes||0;
  document.getElementById('ep-count').textContent=`${epCount} Episodes`;
  if(epCount>0){
    const eps=Array.from({length:epCount},(_,i)=>i+1);
    epGrid.innerHTML=eps.map(ep=>`<a href="watch.html?id=${m.id}&ep=${ep}" class="ep-btn">EP ${ep}</a>`).join('');
  } else {
    epGrid.innerHTML='<p style="color:var(--text3);font-size:0.85rem">Episodes not available yet.</p>';
  }
  // Characters
  const charGrid=document.getElementById('char-grid');
  const chars=m.characters?.nodes||[];
  if(chars.length){
    charGrid.innerHTML=chars.map((c,i)=>{
      const role=m.characters?.edges?.[i]?.role||'';
      return `<div class="char-card"><img class="char-img" src="${c.image?.medium||''}" alt="${c.name?.full||''}" loading="lazy" onerror="this.style.background='var(--card2)'"/><div><div class="char-name">${c.name?.full||'Unknown'}</div><div class="char-role">${role}</div></div></div>`;
    }).join('');
  } else charGrid.innerHTML='<p style="color:var(--text3);font-size:0.85rem">No characters found.</p>';
  // Staff
  const staffGrid=document.getElementById('staff-grid');
  const staff=m.staff?.nodes||[];
  if(staff.length){
    staffGrid.innerHTML=staff.map((s,i)=>{
      const role=m.staff?.edges?.[i]?.role||'';
      return `<div class="staff-card"><img class="staff-img" src="${s.image?.medium||''}" alt="${s.name?.full||''}" loading="lazy" onerror="this.style.background='var(--card2)'"/><div><div class="staff-name">${s.name?.full||'Unknown'}</div><div class="staff-role">${role}</div></div></div>`;
    }).join('');
  } else staffGrid.innerHTML='<p style="color:var(--text3);font-size:0.85rem">No staff data.</p>';
  // Relations
  const relGrid=document.getElementById('rel-grid');
  const rels=m.relations?.nodes||[];
  if(rels.length){
    relGrid.innerHTML=rels.map((r,i)=>{
      const type=m.relations?.edges?.[i]?.relationType||'';
      const rt=r.title?.english||r.title?.romaji||'Unknown';
      return `<a href="anime.html?id=${r.id}" class="rel-card"><img class="rel-img" src="${r.coverImage?.medium||''}" alt="${rt}" loading="lazy" onerror="this.style.background='var(--card2)'"/><div class="rel-info"><div class="rel-type">${type}</div><div class="rel-title">${rt}</div><div class="rel-format">${r.format||''}</div></div></a>`;
    }).join('');
  } else relGrid.innerHTML='<p style="color:var(--text3);font-size:0.85rem">No relations found.</p>';
  // Recommendations
  const recGrid=document.getElementById('rec-grid');
  const recs=(m.recommendations?.nodes||[]).filter(r=>r.mediaRecommendation);
  if(recs.length){
    recGrid.innerHTML=recs.map(r=>{
      const a=r.mediaRecommendation;
      return `<a href="anime.html?id=${a.id}" class="rec-card"><img class="rec-img" src="${a.coverImage?.medium||''}" alt="${a.title?.english||a.title?.romaji||''}" loading="lazy"/><div class="rec-title">${a.title?.english||a.title?.romaji||'Unknown'}</div></a>`;
    }).join('');
  } else recGrid.innerHTML='<p style="color:var(--text3);font-size:0.85rem">No recommendations found.</p>';
}

// Tabs
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab)?.classList.add('active');
  });
});

// Trailer
function openTrailer(id){
  document.getElementById('trailer-iframe').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById('trailer-modal').classList.add('open');
}
document.getElementById('trailer-close').addEventListener('click',()=>{
  document.getElementById('trailer-modal').classList.remove('open');
  document.getElementById('trailer-iframe').src='';
});
document.getElementById('trailer-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('trailer-modal')){
    document.getElementById('trailer-modal').classList.remove('open');
    document.getElementById('trailer-iframe').src='';
  }
});

// Search
document.getElementById('search-btn').addEventListener('click',()=>{
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(),100);
});
document.getElementById('search-close').addEventListener('click',()=>document.getElementById('search-overlay').classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('search-overlay').classList.remove('open');});
let searchDebounce=null;
document.getElementById('search-input').addEventListener('input',async function(){
  clearTimeout(searchDebounce);
  const q=this.value.trim();
  const res=document.getElementById('so-results');
  if(!q){res.innerHTML='<div class="so-empty">Start typing...</div>';return;}
  searchDebounce=setTimeout(async()=>{
    res.innerHTML='<div class="so-empty">Searching...</div>';
    try{
      const data=await gql(`query($q:String){Page(perPage:20){media(search:$q,type:ANIME){id title{english romaji} coverImage{medium} averageScore}}}`,{q});
      const list=data?.Page?.media||[];
      if(!list.length){res.innerHTML='<div class="so-empty">No results</div>';return;}
      res.innerHTML=`<div class="so-grid">${list.map(a=>`<a href="anime.html?id=${a.id}" class="so-card"><img class="so-card-img" src="${a.coverImage?.medium||''}" alt="${a.title?.english||a.title?.romaji||''}" loading="lazy"/><div class="so-card-info"><div class="so-card-title">${a.title?.english||a.title?.romaji||'Unknown'}</div>${a.averageScore?`<div class="so-card-score">★ ${(a.averageScore/10).toFixed(1)}</div>`:''}</div></a>`).join('')}</div>`;
    }catch{res.innerHTML='<div class="so-empty">Search failed</div>';}
  },400);
});

// Sidebar
const burger=document.getElementById('burger');
const overlay=document.getElementById('overlay');
const sidebar=document.getElementById('sidebar');
burger?.addEventListener('click',()=>{sidebar.classList.add('open');overlay.classList.add('open');});
overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('open');});
document.getElementById('sb-close')?.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('open');});

document.addEventListener('DOMContentLoaded',loadAnime);
</script>
</body>
</html>
