<title>Anime Details - NamiTube Infinity</title>
<style>

:root {
  --bg-primary: #050508;
  --bg-secondary: #0a0a12;
  --bg-tertiary: #11111a;
  --bg-glass: rgba(10, 10, 18, 0.72);
  --bg-glass-hover: rgba(20, 20, 35, 0.85);
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text-primary: #f0f0f5;
  --text-secondary: #a0a0b0;
  --text-muted: #606070;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-secondary: #c084fc;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gradient-hero: linear-gradient(135deg, #1a0b2e 0%, #0f0518 50%, #050508 100%);
  --gradient-card: linear-gradient(180deg, rgba(124,58,237,0.08) 0%, rgba(10,10,18,0.95) 100%);
  --gradient-glow: radial-gradient(ellipse at center, rgba(124,58,237,0.15) 0%, transparent 70%);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 40px rgba(124,58,237,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-display: 'Inter', sans-serif;
  --header-height: 72px;
  --sidebar-width: 280px;
  --max-content: 1440px;
  --safe-area: clamp(16px, 4vw, 48px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  overflow-x: hidden;
  max-width: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

::selection {
  background: rgba(124, 58, 237, 0.4);
  color: var(--text-primary);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.5); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(124,58,237,0.2); }
  50% { box-shadow: 0 0 40px rgba(124,58,237,0.4); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

.glass {
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid var(--border);
}

.glass-strong {
  background: var(--bg-glass-hover);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border: 1px solid var(--border-hover);
}

.text-gradient {
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-md);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  border: none;
  transition: all var(--transition-base);
  text-decoration: none;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent) 0%, #6d28d9 100%);
  color: white;
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px 16px;
}

.btn-ghost:hover {
  color: var(--text-primary);
  background: var(--surface);
}

.section-title {
  font-size: clamp(1.25rem, 2.5vw, 1.75rem);
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title .icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  border-radius: var(--radius-sm);
  font-size: 1rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-base);
  position: relative;
}

.card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-lg), var(--shadow-glow);
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient-glow);
  opacity: 0;
  transition: opacity var(--transition-base);
  pointer-events: none;
  z-index: 0;
}

.card:hover::before { opacity: 1; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.badge-accent {
  background: rgba(124, 58, 237, 0.15);
  color: var(--accent-light);
  border: 1px solid rgba(124, 58, 237, 0.3);
}

.badge-success {
  background: rgba(16, 185, 129, 0.15);
  color: var(--success);
  border: 1px solid rgba(16, 185, 129, 0.3);
}

.badge-warning {
  background: rgba(245, 158, 11, 0.15);
  color: var(--warning);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.score-ring {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  position: relative;
  background: conic-gradient(var(--accent) calc(var(--score) * 10%), var(--bg-tertiary) 0);
}

.score-ring::before {
  content: '';
  position: absolute;
  inset: 3px;
  background: var(--bg-secondary);
  border-radius: 50%;
}

.score-ring span {
  position: relative;
  z-index: 1;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* Header */
.main-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--safe-area);
  transition: all var(--transition-base);
  border-bottom: 1px solid transparent;
  background: rgba(5, 5, 8, 0.85);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-bottom-color: var(--border);
}

.header-left, .header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.hamburger {
  width: 40px; height: 40px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  gap: 5px; cursor: pointer;
  background: none; border: none;
}

.hamburger span {
  width: 22px; height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: all var(--transition-base);
  transform-origin: center;
}

.hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.logo { height: 36px; filter: drop-shadow(0 0 12px rgba(124, 58, 237, 0.4)); transition: filter var(--transition-base); }
.logo:hover { filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.6)); }

.desktop-nav {
  display: flex;
  align-items: center;
  gap: 4px;
}

.desktop-nav a {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.desktop-nav a:hover, .desktop-nav a.active {
  color: var(--text-primary);
  background: var(--surface);
}

.header-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.header-btn:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.profile-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem; color: white;
  cursor: pointer; border: 2px solid transparent;
  transition: all var(--transition-fast);
}

.profile-avatar:hover {
  border-color: var(--accent-light);
  box-shadow: 0 0 16px rgba(124, 58, 237, 0.3);
}

/* Mobile Sidebar */
.mobile-sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  z-index: 999;
  background: rgba(5, 5, 8, 0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform var(--transition-base);
  padding: calc(var(--header-height) + 20px) 24px 24px;
  overflow-y: auto;
}

.mobile-sidebar.open { transform: translateX(0); }

.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 998;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-base);
}

.mobile-sidebar.open + .sidebar-overlay { opacity: 1; pointer-events: auto; }

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  transition: all var(--transition-fast);
}

.sidebar-nav a:hover, .sidebar-nav a.active {
  background: var(--surface);
  color: var(--text-primary);
}

/* Anime Hero */
.anime-hero {
  position: relative;
  min-height: 70vh;
  padding-top: var(--header-height);
  display: flex;
  align-items: flex-end;
}

.anime-hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 20%;
  filter: brightness(0.25) saturate(1.3);
}

.anime-hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--bg-primary) 0%, rgba(5,5,8,0.6) 40%, rgba(5,5,8,0.3) 100%);
}

.anime-hero-content {
  position: relative;
  z-index: 2;
  padding: 48px var(--safe-area);
  max-width: var(--max-content);
  margin: 0 auto;
  width: 100%;
  display: flex;
  gap: 40px;
  align-items: flex-end;
}

.anime-poster {
  flex-shrink: 0;
  width: 260px;
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(124, 58, 237, 0.1);
  border: 1px solid var(--border);
  transition: all var(--transition-base);
}

.anime-poster:hover {
  transform: translateY(-4px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 60px rgba(124, 58, 237, 0.2);
}

.anime-poster img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}

.anime-info {
  flex: 1;
  min-width: 0;
}

.anime-title {
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 8px;
}

.anime-title-jp {
  font-size: 1rem;
  color: var(--text-muted);
  margin-bottom: 20px;
  font-weight: 400;
}

.anime-meta-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.anime-score {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.5rem;
  font-weight: 800;
}

.anime-score svg {
  width: 28px; height: 28px;
  fill: #fbbf24;
}

.anime-score .score-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
}

.anime-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  font-size: 0.9rem;
}

.anime-genres {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.anime-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* Content Tabs */
.content-tabs {
  display: flex;
  gap: 4px;
  padding: 0 var(--safe-area);
  max-width: var(--max-content);
  margin: 0 auto;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}

.content-tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 16px 20px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  transition: color var(--transition-fast);
}

.tab-btn:hover {
  color: var(--text-primary);
}

.tab-btn.active {
  color: var(--accent-light);
}

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 12px;
  right: 12px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
  border-radius: 2px;
}

.tab-panel {
  display: none;
  padding: 32px var(--safe-area);
  max-width: var(--max-content);
  margin: 0 auto;
  animation: fadeUp 0.4s ease;
}

.tab-panel.active {
  display: block;
}

/* Synopsis */
.synopsis-text {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text-secondary);
  max-width: 800px;
}

/* Info Grid */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.info-card {
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}

.info-card h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}

.info-card p {
  font-size: 0.95rem;
  color: var(--text-primary);
  font-weight: 500;
}

/* Character Cards */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.char-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition-base);
  text-decoration: none;
  color: inherit;
  display: block;
}

.char-card:hover {
  transform: translateY(-4px);
  border-color: var(--border-hover);
  box-shadow: var(--shadow-glow);
}

.char-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
}

.char-card .char-info {
  padding: 12px;
}

.char-card .char-name {
  font-weight: 700;
  font-size: 0.85rem;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.char-card .char-role {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Staff Cards */
.staff-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.staff-card {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all var(--transition-base);
  text-decoration: none;
  color: inherit;
  align-items: center;
}

.staff-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
}

.staff-card img {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.staff-card .staff-info {
  min-width: 0;
}

.staff-card .staff-name {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.staff-card .staff-role {
  font-size: 0.8rem;
  color: var(--text-muted);
}

/* Episode List */
.episode-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.episode-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  text-decoration: none;
  color: inherit;
}

.episode-item:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateX(4px);
}

.episode-item .ep-num {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: white;
  flex-shrink: 0;
}

.episode-item .ep-info {
  flex: 1;
  min-width: 0;
}

.episode-item .ep-title {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 2px;
}

.episode-item .ep-date {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.episode-item .ep-play {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.episode-item:hover .ep-play {
  opacity: 1;
}

/* Recommendation Cards */
.rec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

/* Review Cards */
.review-card {
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
}

.review-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.review-header img {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
}

.review-header .reviewer {
  flex: 1;
}

.review-header .reviewer-name {
  font-weight: 700;
  font-size: 0.95rem;
}

.review-header .reviewer-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
}

.review-score {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent-light);
}

.review-body {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.stat-card {
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  text-align: center;
  transition: all var(--transition-base);
}

.stat-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.stat-card .stat-value {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.stat-card .stat-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Trailer */
.trailer-container {
  position: relative;
  padding-bottom: 56.25%;
  border-radius: var(--radius-xl);
  overflow: hidden;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
}

.trailer-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* Loading */
.loading-container {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding-top: var(--header-height);
}

/* Relations */
.relation-card {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: all var(--transition-base);
  text-decoration: none;
  color: inherit;
  align-items: center;
}

.relation-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateX(4px);
}

.relation-card img {
  width: 60px;
  height: 84px;
  object-fit: cover;
  border-radius: var(--radius-sm);
  flex-shrink: 0;
}

.relation-card .rel-info {
  flex: 1;
  min-width: 0;
}

.relation-card .rel-type {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--accent-light);
  font-weight: 600;
  margin-bottom: 4px;
}

.relation-card .rel-title {
  font-weight: 700;
  font-size: 0.95rem;
}

/* Responsive */
@media (max-width: 1024px) {
  .desktop-nav { display: none; }
  .anime-hero-content { flex-direction: column; align-items: center; text-align: center; }
  .anime-poster { width: 200px; }
  .anime-info { width: 100%; }
  .anime-actions { justify-content: center; }
}

@media (max-width: 768px) {
  .anime-hero { min-height: auto; padding-bottom: 40px; }
  .anime-poster { width: 160px; }
  .info-grid { grid-template-columns: 1fr; }
  .char-grid { grid-template-columns: repeat(2, 1fr); }
  .staff-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1025px) {
  .hamburger { display: none; }
}

<script>

const NamiTube = {
  API_BASE: 'https://api.jikan.moe/v4',
  CACHE_TTL: 5 * 60 * 1000,
  RATE_LIMIT_DELAY: 400,
  lastRequestTime: 0,
  pendingRequests: new Map(),
  cache: new Map(),

  async fetch(endpoint, options = {}) {
    const cacheKey = endpoint + JSON.stringify(options);
    const cached = this.cache.get(cacheKey);
    if (cached && Date.now() - cached.time < this.CACHE_TTL) {
      return cached.data;
    }

    if (this.pendingRequests.has(cacheKey)) {
      return this.pendingRequests.get(cacheKey);
    }

    const now = Date.now();
    const delay = Math.max(0, this.RATE_LIMIT_DELAY - (now - this.lastRequestTime));

    const promise = new Promise((resolve, reject) => {
      setTimeout(async () => {
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 15000);

          const response = await fetch(this.API_BASE + endpoint, {
            ...options,
            signal: controller.signal,
            headers: {
              'Accept': 'application/json',
              ...options.headers
            }
          });

          clearTimeout(timeout);
          this.lastRequestTime = Date.now();

          if (!response.ok) {
            if (response.status === 429) {
              await new Promise(r => setTimeout(r, 2000));
              return resolve(this.fetch(endpoint, options));
            }
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();
          this.cache.set(cacheKey, { data, time: Date.now() });
          resolve(data);
        } catch (error) {
          reject(error);
        } finally {
          this.pendingRequests.delete(cacheKey);
        }
      }, delay);
    });

    this.pendingRequests.set(cacheKey, promise);
    return promise;
  },

  getTopAnime(page = 1, limit = 25) {
    return this.fetch(`/top/anime?page=${page}&limit=${limit}`);
  },

  getAiringAnime(page = 1, limit = 25) {
    return this.fetch(`/seasons/now?page=${page}&limit=${limit}`);
  },

  getUpcomingAnime(page = 1, limit = 25) {
    return this.fetch(`/seasons/upcoming?page=${page}&limit=${limit}`);
  },

  getSeasonalAnime(year, season, page = 1, limit = 25) {
    return this.fetch(`/seasons/${year}/${season}?page=${page}&limit=${limit}`);
  },

  getAnimeDetails(id) {
    return this.fetch(`/anime/${id}/full`);
  },

  getAnimeCharacters(id) {
    return this.fetch(`/anime/${id}/characters`);
  },

  getAnimeStaff(id) {
    return this.fetch(`/anime/${id}/staff`);
  },

  getAnimeEpisodes(id, page = 1) {
    return this.fetch(`/anime/${id}/episodes?page=${page}`);
  },

  getAnimeRecommendations(id) {
    return this.fetch(`/anime/${id}/recommendations`);
  },

  getAnimeReviews(id, page = 1) {
    return this.fetch(`/anime/${id}/reviews?page=${page}`);
  },

  getAnimeStatistics(id) {
    return this.fetch(`/anime/${id}/statistics`);
  },

  getSearchAnime(query, filters = {}) {
    const params = new URLSearchParams({ q: query, page: 1, limit: 25, ...filters });
    return this.fetch(`/anime?${params}`);
  },

  getGenres() {
    return this.fetch('/genres/anime');
  },

  getStudios(page = 1, limit = 25) {
    return this.fetch(`/producers?page=${page}&limit=${limit}`);
  },

  getStudioDetails(id) {
    return this.fetch(`/producers/${id}/full`);
  },

  getTopCharacters(page = 1, limit = 25) {
    return this.fetch(`/top/characters?page=${page}&limit=${limit}`);
  },

  getCharacterDetails(id) {
    return this.fetch(`/characters/${id}/full`);
  },

  getSchedule(day = '') {
    const endpoint = day ? `/schedules?filter=${day}` : '/schedules';
    return this.fetch(endpoint);
  },

  getSeasonList() {
    return this.fetch('/seasons');
  },

  formatNumber(num) {
    if (!num) return '0';
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num.toString();
  },

  formatDate(dateStr) {
    if (!dateStr) return 'TBA';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return dateStr;
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  },

  getScoreColor(score) {
    if (score >= 8) return '#10b981';
    if (score >= 7) return '#7c3aed';
    if (score >= 6) return '#f59e0b';
    return '#ef4444';
  },

  truncate(str, len = 150) {
    if (!str) return '';
    if (str.length <= len) return str;
    return str.substring(0, len).trim() + '...';
  },

  escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },

  debounce(fn, ms = 300) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), ms);
    };
  },

  throttle(fn, ms = 100) {
    let last = 0;
    return (...args) => {
      const now = Date.now();
      if (now - last >= ms) {
        last = now;
        fn(...args);
      }
    };
  },

  observeLazyImages() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          if (img.dataset.src) {
            img.src = img.dataset.src;
            img.removeAttribute('data-src');
            img.classList.add('loaded');
          }
          observer.unobserve(img);
        }
      });
    }, { rootMargin: '50px' });

    document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
    return observer;
  },

  initTooltips() {
    document.querySelectorAll('[data-tooltip]').forEach(el => {
      el.addEventListener('mouseenter', (e) => {
        const tooltip = document.createElement('div');
        tooltip.className = 'glass tooltip';
        tooltip.textContent = el.dataset.tooltip;
        tooltip.style.cssText = 'position:fixed;z-index:9999;padding:8px 12px;border-radius:8px;font-size:0.8rem;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(tooltip);

        const rect = el.getBoundingClientRect();
        tooltip.style.left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2 + 'px';
        tooltip.style.top = rect.top - tooltip.offsetHeight - 8 + 'px';

        el._tooltip = tooltip;
      });

      el.addEventListener('mouseleave', () => {
        if (el._tooltip) {
          el._tooltip.remove();
          el._tooltip = null;
        }
      });
    });
  },

  showToast(message, type = 'info', duration = 3000) {
    const existing = document.querySelector('.nami-toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = `nami-toast glass ${type}`;
    toast.innerHTML = `
      <span class="toast-icon">${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
      <span class="toast-message">${this.escapeHtml(message)}</span>
    `;
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:10px;animation:fadeUp 0.3s ease;max-width:400px;';

    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'fadeUp 0.3s ease reverse';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  },

  getLocalProfile() {
    try {
      return JSON.parse(localStorage.getItem('nami_profile') || '{}');
    } catch {
      return {};
    }
  },

  setLocalProfile(data) {
    localStorage.setItem('nami_profile', JSON.stringify(data));
  },

  addToHistory(malId, title, image, episode = 1) {
    const profile = this.getLocalProfile();
    profile.history = profile.history || [];
    profile.history = profile.history.filter(h => h.malId !== malId);
    profile.history.unshift({ malId, title, image, episode, timestamp: Date.now() });
    profile.history = profile.history.slice(0, 50);
    this.setLocalProfile(profile);
  },

  addToFavorites(malId, title, image) {
    const profile = this.getLocalProfile();
    profile.favorites = profile.favorites || [];
    if (!profile.favorites.find(f => f.malId === malId)) {
      profile.favorites.push({ malId, title, image, added: Date.now() });
      this.setLocalProfile(profile);
      this.showToast('Added to favorites', 'success');
    }
  },

  removeFromFavorites(malId) {
    const profile = this.getLocalProfile();
    profile.favorites = (profile.favorites || []).filter(f => f.malId !== malId);
    this.setLocalProfile(profile);
    this.showToast('Removed from favorites', 'info');
  },

  isFavorite(malId) {
    const profile = this.getLocalProfile();
    return (profile.favorites || []).some(f => f.malId === malId);
  },

  addToWatchlist(malId, title, image) {
    const profile = this.getLocalProfile();
    profile.watchlist = profile.watchlist || [];
    if (!profile.watchlist.find(w => w.malId === malId)) {
      profile.watchlist.push({ malId, title, image, added: Date.now() });
      this.setLocalProfile(profile);
      this.showToast('Added to watchlist', 'success');
    }
  },

  getContinueWatching() {
    const profile = this.getLocalProfile();
    return (profile.history || []).slice(0, 12);
  },

  getFavorites() {
    const profile = this.getLocalProfile();
    return (profile.favorites || []).slice().reverse();
  },

  getWatchlist() {
    const profile = this.getLocalProfile();
    return (profile.watchlist || []).slice().reverse();
  }
};

// Slider/Carousel System
class NamiSlider {
  constructor(container, options = {}) {
    this.container = container;
    this.track = container.querySelector('.slider-track');
    this.items = [];
    this.currentIndex = 0;
    this.options = {
      gap: 16,
      visibleItems: { mobile: 2, tablet: 3, desktop: 5, wide: 6 },
      autoplay: false,
      autoplayDelay: 5000,
      loop: false,
      ...options
    };
    this.isDragging = false;
    this.startX = 0;
    this.scrollLeft = 0;
    this.autoplayTimer = null;

    this.init();
  }

  init() {
    if (!this.track) return;
    this.items = Array.from(this.track.children);
    if (this.items.length === 0) return;

    this.container.addEventListener('mousedown', this.onMouseDown.bind(this));
    this.container.addEventListener('mousemove', this.onMouseMove.bind(this));
    this.container.addEventListener('mouseup', this.onMouseUp.bind(this));
    this.container.addEventListener('mouseleave', this.onMouseUp.bind(this));

    this.container.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: true });
    this.container.addEventListener('touchmove', this.onTouchMove.bind(this), { passive: true });
    this.container.addEventListener('touchend', this.onTouchEnd.bind(this));

    this.container.addEventListener('wheel', this.onWheel.bind(this), { passive: true });

    const prevBtn = this.container.querySelector('.slider-prev');
    const nextBtn = this.container.querySelector('.slider-next');
    if (prevBtn) prevBtn.addEventListener('click', () => this.prev());
    if (nextBtn) nextBtn.addEventListener('click', () => this.next());

    window.addEventListener('resize', NamiTube.throttle(() => this.update(), 200));
    this.update();

    if (this.options.autoplay) this.startAutoplay();
  }

  getVisibleCount() {
    const w = window.innerWidth;
    if (w >= 1400) return this.options.visibleItems.wide;
    if (w >= 1024) return this.options.visibleItems.desktop;
    if (w >= 768) return this.options.visibleItems.tablet;
    return this.options.visibleItems.mobile;
  }

  update() {
    const count = this.getVisibleCount();
    const width = (this.container.offsetWidth - (count - 1) * this.options.gap) / count;
    this.items.forEach(item => {
      item.style.minWidth = `${width}px`;
      item.style.maxWidth = `${width}px`;
    });
  }

  scrollToIndex(index) {
    const count = this.getVisibleCount();
    const maxIndex = Math.max(0, this.items.length - count);
    this.currentIndex = Math.max(0, Math.min(index, maxIndex));

    const item = this.items[this.currentIndex];
    if (item) {
      this.track.scrollTo({ left: item.offsetLeft, behavior: 'smooth' });
    }
  }

  next() {
    this.scrollToIndex(this.currentIndex + 1);
  }

  prev() {
    this.scrollToIndex(this.currentIndex - 1);
  }

  onMouseDown(e) {
    this.isDragging = true;
    this.startX = e.pageX - this.track.offsetLeft;
    this.scrollLeft = this.track.scrollLeft;
    this.track.style.cursor = 'grabbing';
  }

  onMouseMove(e) {
    if (!this.isDragging) return;
    e.preventDefault();
    const x = e.pageX - this.track.offsetLeft;
    const walk = (x - this.startX) * 1.5;
    this.track.scrollLeft = this.scrollLeft - walk;
  }

  onMouseUp() {
    this.isDragging = false;
    this.track.style.cursor = 'grab';
  }

  onTouchStart(e) {
    this.startX = e.touches[0].clientX;
    this.scrollLeft = this.track.scrollLeft;
  }

  onTouchMove(e) {
    const x = e.touches[0].clientX;
    const walk = (x - this.startX) * 1.5;
    this.track.scrollLeft = this.scrollLeft - walk;
  }

  onTouchEnd() {
    // Snap to nearest item
  }

  onWheel(e) {
    if (Math.abs(e.deltaY) < Math.abs(e.deltaX) || Math.abs(e.deltaY) > 10) return;
    e.preventDefault();
    this.track.scrollLeft += e.deltaY > 0 ? 300 : -300;
  }

  startAutoplay() {
    this.autoplayTimer = setInterval(() => {
      const count = this.getVisibleCount();
      if (this.currentIndex >= this.items.length - count) {
        this.scrollToIndex(0);
      } else {
        this.next();
      }
    }, this.options.autoplayDelay);
  }

  stopAutoplay() {
    if (this.autoplayTimer) {
      clearInterval(this.autoplayTimer);
      this.autoplayTimer = null;
    }
  }
}

// Command Palette
class CommandPalette {
  constructor() {
    this.isOpen = false;
    this.selectedIndex = -1;
    this.results = [];
    this.init();
  }

  init() {
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        this.toggle();
      }
      if (e.key === 'Escape' && this.isOpen) {
        this.close();
      }
    });
  }

  toggle() {
    if (this.isOpen) this.close();
    else this.open();
  }

  open() {
    this.isOpen = true;
    const existing = document.getElementById('command-palette');
    if (existing) existing.remove();

    const palette = document.createElement('div');
    palette.id = 'command-palette';
    palette.innerHTML = `
      <div class="palette-overlay" style="position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);animation:fadeIn 0.2s;"></div>
      <div class="palette-container" style="position:fixed;top:15%;left:50%;transform:translateX(-50%);width:min(640px,90vw);z-index:10001;animation:fadeScale 0.2s;">
        <div class="glass" style="border-radius:16px;overflow:hidden;border:1px solid var(--border-hover);box-shadow:0 25px 50px rgba(0,0,0,0.5);">
          <div style="display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" placeholder="Search anime, characters, studios..." style="flex:1;background:transparent;border:none;color:var(--text-primary);font-size:1rem;outline:none;" id="palette-input" autocomplete="off">
            <kbd style="padding:4px 8px;border-radius:6px;background:var(--surface);font-size:0.75rem;color:var(--text-muted);border:1px solid var(--border);">ESC</kbd>
          </div>
          <div id="palette-results" style="max-height:400px;overflow-y:auto;padding:8px;"></div>
          <div style="display:flex;align-items:center;gap:16px;padding:12px 20px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted);">
            <span><kbd style="padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);">↑↓</kbd> Navigate</span>
            <span><kbd style="padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--border);">Enter</kbd> Select</span>
          </div>
        </div>
      </div>
    `;

    document.body.appendChild(palette);

    const input = document.getElementById('palette-input');
    input.focus();

    const debouncedSearch = NamiTube.debounce((query) => this.search(query), 300);
    input.addEventListener('input', (e) => debouncedSearch(e.target.value));

    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.selectedIndex = Math.min(this.selectedIndex + 1, this.results.length - 1);
        this.updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.selectedIndex = Math.max(this.selectedIndex - 1, -1);
        this.updateSelection();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (this.selectedIndex >= 0 && this.results[this.selectedIndex]) {
          window.location.href = this.results[this.selectedIndex].url;
        }
      }
    });

    palette.querySelector('.palette-overlay').addEventListener('click', () => this.close());
  }

  close() {
    this.isOpen = false;
    const palette = document.getElementById('command-palette');
    if (palette) palette.remove();
  }

  async search(query) {
    if (!query || query.length < 2) {
      this.renderResults([]);
      return;
    }

    try {
      const data = await NamiTube.getSearchAnime(query, { limit: 8 });
      this.results = (data.data || []).map(anime => ({
        title: anime.title,
        subtitle: anime.type + (anime.year ? ` • ${anime.year}` : ''),
        image: anime.images?.jpg?.small_image_url,
        url: `anime.html?id=${anime.mal_id}`,
        score: anime.score
      }));
      this.selectedIndex = -1;
      this.renderResults(this.results);
    } catch (e) {
      console.error('Search error:', e);
    }
  }

  renderResults(results) {
    const container = document.getElementById('palette-results');
    if (!container) return;

    if (results.length === 0) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-muted);">Start typing to search...</div>';
      return;
    }

    container.innerHTML = results.map((r, i) => `
      <a href="${r.url}" class="palette-item ${i === this.selectedIndex ? 'selected' : ''}" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;text-decoration:none;color:inherit;transition:background 0.15s;">
        <img src="${r.image || ''}" style="width:40px;height:56px;object-fit:cover;border-radius:6px;background:var(--bg-tertiary);" loading="lazy">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${NamiTube.escapeHtml(r.title)}</div>
          <div style="font-size:0.8rem;color:var(--text-muted);margin-top:2px;">${r.subtitle}</div>
        </div>
        ${r.score ? `<span style="font-weight:700;color:${NamiTube.getScoreColor(r.score)};font-size:0.85rem;">${r.score}</span>` : ''}
      </a>
    `).join('');

    container.querySelectorAll('.palette-item').forEach((item, i) => {
      item.addEventListener('mouseenter', () => {
        this.selectedIndex = i;
        this.updateSelection();
      });
    });
  }

  updateSelection() {
    document.querySelectorAll('.palette-item').forEach((item, i) => {
      item.style.background = i === this.selectedIndex ? 'var(--surface-hover)' : 'transparent';
    });
  }
}

        <div class="stat-card">
          <div class="stat-value">${NamiTube.formatNumber(stats.plan_to_watch || 0)}</div>
          <div class="stat-label">Plan to Watch</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${NamiTube.formatNumber(stats.total || 0)}</div>
          <div class="stat-label">Total</div>
        </div>
      `;
    } catch(e) { console.error('Stats error:', e); }
  }

  window.toggleFavorite = function() {
    const btn = document.getElementById('fav-btn');
    const title = document.getElementById('anime-title').textContent;
    const img = document.querySelector('#anime-poster img')?.src || '';

    if (NamiTube.isFavorite(malId)) {
      NamiTube.removeFromFavorites(malId);
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Add to Favorites`;
    } else {
      NamiTube.addToFavorites(malId, title, img);
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Favorited`;
    }
  };

  window.addToWatchlist = function() {
    const title = document.getElementById('anime-title').textContent;
    const img = document.querySelector('#anime-poster img')?.src || '';
    NamiTube.addToWatchlist(malId, title, img);
  };

  // Mobile menu
  document.querySelector('.hamburger')?.addEventListener('click', () => {
    document.getElementById('mobile-sidebar').classList.toggle('open');
    document.querySelector('.hamburger').classList.toggle('active');
  });

  document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
    document.getElementById('mobile-sidebar').classList.remove('open');
    document.querySelector('.hamburger').classList.remove('active');
  });

  document.getElementById('search-trigger')?.addEventListener('click', () => {
    if (window.commandPalette) window.commandPalette.open();
  });

  loadAnime();
})();
</script>
</body>
</html>
