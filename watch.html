<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#080810;--bg2:#0d0d1a;--bg3:#12122a;
--purple:#7c3aed;--violet:#8b5cf6;--neon:#a78bfa;--cyan:#22d3ee;
--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
--card:#111128;--card2:#1a1a35;
--border:rgba(139,92,246,.18);--border2:rgba(139,92,246,.08);
--radius:12px;--radius2:20px;
--shadow:0 8px 32px rgba(0,0,0,.6);--glow:0 0 40px rgba(124,58,237,.25);
--transition:.3s cubic-bezier(.4,0,.2,1);
--font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{overflow-x:hidden;max-width:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--purple);border-radius:3px}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;max-width:100%}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:9999;height:60px;display:flex;align-items:center;padding:0 clamp(12px,3vw,32px);gap:16px;background:rgba(8,8,16,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border2);transition:all var(--transition)}
.header-logo img{height:30px;filter:drop-shadow(0 0 8px rgba(124,58,237,.4))}
.header-back{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;background:rgba(139,92,246,.08);border:1px solid var(--border2);font-size:.84rem;font-weight:600;color:var(--text2);transition:all var(--transition)}
.header-back:hover{background:rgba(139,92,246,.18);color:var(--neon)}
.header-title{flex:1;min-width:0}
.header-title h2{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-title p{font-size:.75rem;color:var(--text3)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.hbtn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(139,92,246,.08);border:1px solid var(--border2);color:var(--text2);transition:all var(--transition)}
.hbtn:hover{background:rgba(139,92,246,.18);color:var(--neon)}
.hbtn.active{background:rgba(124,58,237,.2);border-color:var(--border);color:var(--neon)}

/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);pointer-events:all;animation:toastIn .4s ease forwards;max-width:320px}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(100%)}}
.toast-body h4{font-size:.84rem;font-weight:600}
.toast-body p{font-size:.75rem;color:var(--text2)}

/* MAIN LAYOUT */
.watch-layout{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:calc(100vh - 60px);margin-top:60px}
@media(max-width:1024px){.watch-layout{grid-template-columns:1fr;}}

/* PLAYER AREA */
.player-area{background:#000;position:relative}
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;max-height:calc(100vh - 60px)}
.player-wrap.theater{position:fixed;inset:60px 0 0 0;max-height:none;height:calc(100vh - 60px);z-index:1000}
#stream-frame{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-overlay{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;background:linear-gradient(0deg,rgba(0,0,0,.8) 0%,transparent 40%,transparent 70%,rgba(0,0,0,.5) 100%);display:flex;flex-direction:column;justify-content:space-between;padding:16px}
.player-wrap:hover .player-overlay{opacity:1;pointer-events:all}
.player-top{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.player-bottom{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.p-ctrl{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);color:#fff;transition:all var(--transition);font-size:.8rem;font-weight:700;backdrop-filter:blur(8px)}
.p-ctrl:hover{background:rgba(124,58,237,.4);border-color:rgba(167,139,250,.4)}
.p-ctrl.active{background:rgba(124,58,237,.5);border-color:rgba(167,139,250,.5);color:var(--neon)}

/* PLAYER INFO */
.player-info{padding:clamp(14px,2vw,20px);background:var(--bg)}
.player-info-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.player-title-sec h2{font-size:clamp(1rem,3vw,1.25rem);font-weight:800;margin-bottom:4px}
.player-title-sec p{font-size:.82rem;color:var(--text3)}
.player-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:600;transition:all var(--transition)}
.ctrl-btn.primary{background:linear-gradient(135deg,var(--purple),var(--violet));color:#fff}
.ctrl-btn.primary:hover{opacity:.9;transform:translateY(-1px)}
.ctrl-btn.ghost{background:rgba(139,92,246,.08);border:1px solid var(--border2);color:var(--text2)}
.ctrl-btn.ghost:hover{background:rgba(139,92,246,.16);color:var(--neon)}
.ctrl-btn.ghost.active{background:rgba(124,58,237,.2);border-color:var(--border);color:var(--neon)}

/* LANG / QUALITY */
.lang-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.lang-label{font-size:.75rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.lang-btn{padding:6px 16px;border-radius:20px;font-size:.8rem;font-weight:700;border:1px solid var(--border2);color:var(--text2);background:rgba(255,255,255,.04);transition:all var(--transition)}
.lang-btn:hover{border-color:var(--border);color:var(--text)}
.lang-btn.active{background:rgba(124,58,237,.2);border-color:var(--border);color:var(--neon)}

/* EPISODE SIDEBAR */
.ep-sidebar{background:var(--card);border-left:1px solid var(--border2);display:flex;flex-direction:column;max-height:calc(100vh - 60px);position:sticky;top:60px;overflow:hidden}
@media(max-width:1024px){.ep-sidebar{border-left:none;border-top:1px solid var(--border2);max-height:none;position:static}}
.ep-sidebar-head{padding:16px;border-bottom:1px solid var(--border2);flex-shrink:0;display:flex;align-items:center;gap:10px;justify-content:space-between}
.ep-sidebar-head h3{font-size:.9rem;font-weight:700}
.ep-search{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:8px;flex:1}
.ep-search input{background:none;border:none;outline:none;color:var(--text);font-size:.8rem;width:100%}
.ep-search input::placeholder{color:var(--text3)}
.ep-list{overflow-y:auto;flex:1;padding:8px}
.ep-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:all var(--transition);border:1px solid transparent;margin-bottom:4px}
.ep-item:hover{background:rgba(139,92,246,.08)}
.ep-item.active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.25)}
.ep-item.watched{opacity:.6}
.ep-thumb{width:80px;height:45px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--bg)}
.ep-info{flex:1;min-width:0}
.ep-info-num{font-size:.72rem;color:var(--neon);font-weight:700;margin-bottom:2px}
.ep-info-title{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-info-dur{font-size:.7rem;color:var(--text3)}
.ep-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ep-check.done{background:var(--violet);border-color:var(--violet)}

/* RELATED */
.related-section{padding:clamp(20px,3vw,32px)}
.related-title{font-size:1rem;font-weight:800;margin-bottom:14px;letter-spacing:-.02em}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,16vw,160px),1fr));gap:10px}
.rel-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--card);border:1px solid var(--border2);transition:all var(--transition)}
.rel-card:hover{border-color:var(--border);transform:translateY(-2px)}
.rel-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card2)}
.rel-title{padding:6px 8px;font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* AUTOPLAY BANNER */
.autoplay-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);border-radius:var(--radius);margin-bottom:12px;flex-wrap:wrap}
.autoplay-bar p{font-size:.84rem;color:var(--text2);flex:1}
.autoplay-countdown{font-size:1.25rem;font-weight:800;color:var(--neon);min-width:32px}

/* PAGE LOADER */
#page-loader{position:fixed;inset:0;z-index:9999999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .5s}
#page-loader.hidden{opacity:0;pointer-events:none}
.loader-bar{width:200px;height:3px;background:rgba(139,92,246,.15);border-radius:2px;overflow:hidden}
.loader-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--violet));animation:load 1.5s ease-in-out infinite}
@keyframes load{0%{width:0%;margin-left:0}50%{width:60%}100%{width:0%;margin-left:100%}}

/* FOOTER */
#footer{background:var(--bg2);border-top:1px solid var(--border2);padding:32px 20px 24px;text-align:center}
.footer-disclaimer{font-size:.72rem;color:var(--text3);max-width:600px;margin:0 auto 8px;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border2)}
.footer-copy{font-size:.7rem;color:var(--text3)}
</style>

<script>
'use strict';
const API='https://api.jikan.moe/v4';
const reqCache=new Map();
const inflight=new Map();

async function apiFetch(path,retries=3){
  const cached=reqCache.get(path);
  if(cached&&Date.now()-cached.ts<300000)return cached.data;
  if(inflight.has(path))return inflight.get(path);
  const p=(async()=>{
    for(let i=0;i<retries;i++){
      try{
        const ctrl=new AbortController();
        const t=setTimeout(()=>ctrl.abort(),10000);
        const res=await fetch(API+path,{signal:ctrl.signal});
        clearTimeout(t);
        if(res.status===429){await sleep(1000*(i+1));continue;}
        if(!res.ok)throw new Error('API '+res.status);
        const json=await res.json();
        reqCache.set(path,{data:json,ts:Date.now()});
        return json;
      }catch(e){if(i===retries-1)throw e;await sleep(500*(i+1));}
    }
  })();
  inflight.set(path,p);p.finally(()=>inflight.delete(path));
  return p;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showToast(title,msg,type='info'){
  const t=document.createElement('div');t.className=`toast ${type}`;
  t.innerHTML=`<div class="toast-body"><h4>${escHtml(title)}</h4>${msg?`<p>${escHtml(msg)}</p>`:''}</div>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},3000);
}

const params=new URLSearchParams(location.search);
const MAL_ID=parseInt(params.get('id'));
let currentEp=parseInt(params.get('ep'))||1;
let currentLang=params.get('lang')||'sub';
let totalEps=0;
let animeTitle='';
let animeImg='';
let autoplayOn=true;
let autoplayTimer=null;
let theaterMode=false;
let allEpisodes=[];

function updateStreamSrc(){
  const url=`https://megaplay.buzz/stream/mal/${MAL_ID}/${currentEp}/${currentLang}`;
  document.getElementById('stream-frame').src=url;
  // Update URL bar without reload
  const newParams=new URLSearchParams({id:MAL_ID,ep:currentEp,lang:currentLang});
  history.replaceState(null,'',`watch.html?${newParams}`);
}

function updatePageInfo(){
  document.getElementById('header-anime-title').textContent=animeTitle;
  document.getElementById('header-ep-info').textContent=`Episode ${currentEp} · ${currentLang.toUpperCase()}`;
  document.getElementById('watch-title').textContent=animeTitle;
  document.getElementById('watch-ep-label').textContent=`Episode ${currentEp} · ${currentLang.toUpperCase()}`;
  document.title=`${animeTitle} — Ep ${currentEp} — NamiTube Infinity`;
  
  // Lang buttons
  document.getElementById('sub-btn').classList.toggle('active',currentLang==='sub');
  document.getElementById('dub-btn').classList.toggle('active',currentLang==='dub');
  
  // Nav buttons
  document.getElementById('prev-ep-btn').disabled=currentEp<=1;
  document.getElementById('prev-ep-btn').style.opacity=currentEp<=1?'.4':'1';
  document.getElementById('next-ep-btn').disabled=totalEps>0&&currentEp>=totalEps;
  document.getElementById('next-ep-btn').style.opacity=(totalEps>0&&currentEp>=totalEps)?'.4':'1';
  
  // Highlight active ep
  document.querySelectorAll('.ep-item').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.ep)===currentEp);
    if(el.classList.contains('active')){el.scrollIntoView({block:'nearest',behavior:'smooth'});}
  });
  
  // Episode title from loaded list
  const ep=allEpisodes.find(e=>e.mal_id===currentEp);
  const epTitleEl=document.getElementById('ep-title-info');
  const epTitleText=document.getElementById('ep-title-text');
  if(ep?.title&&ep.title!==animeTitle){
    epTitleEl.style.display='';
    epTitleText.textContent=`"${ep.title}"`;
  } else {
    epTitleEl.style.display='none';
  }
  
  // Save to history
  saveHistory();
}

function saveHistory(){
  if(!animeTitle||!MAL_ID)return;
  const history=lsGet('nt_history')||[];
  const idx=history.findIndex(h=>h.id===MAL_ID&&h.ep===currentEp);
  const entry={id:MAL_ID,ep:currentEp,lang:currentLang,title:animeTitle,img:animeImg,progress:50,ts:Date.now()};
  if(idx>-1)history.splice(idx,1);
  history.unshift(entry);
  lsSet('nt_history',history.slice(0,100));
  
  // Mark as watched
  const watched=lsGet('nt_watched_'+MAL_ID)||[];
  if(!watched.includes(currentEp)){watched.push(currentEp);lsSet('nt_watched_'+MAL_ID,watched);}
  
  // Update ep list checked state
  document.querySelectorAll('.ep-item').forEach(el=>{
    const n=parseInt(el.dataset.ep);
    const check=el.querySelector('.ep-check');
    if(check&&watched.includes(n)){check.classList.add('done');check.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';}
  });
}

function navEpisode(dir){
  const next=currentEp+dir;
  if(next<1)return;
  if(totalEps>0&&next>totalEps)return;
  cancelAutoplay();
  currentEp=next;
  updateStreamSrc();
  updatePageInfo();
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchLang(lang){
  currentLang=lang;
  updateStreamSrc();
  updatePageInfo();
}

function jumpToEp(n){
  const ep=parseInt(n);
  if(isNaN(ep)||ep<1)return;
  if(totalEps>0&&ep>totalEps)return;
  currentEp=ep;
  updateStreamSrc();
  updatePageInfo();
}

// Autoplay
function scheduleAutoplay(){
  if(!autoplayOn)return;
  if(totalEps>0&&currentEp>=totalEps)return;
  const bar=document.getElementById('autoplay-bar');
  const countdown=document.getElementById('autoplay-countdown');
  const text=document.getElementById('autoplay-text');
  bar.style.display='flex';
  text.textContent=`Next: Episode ${currentEp+1}`;
  let count=10;
  countdown.textContent=count;
  cancelAutoplay();
  autoplayTimer=setInterval(()=>{
    count--;countdown.textContent=count;
    if(count<=0){cancelAutoplay();playNext();}
  },1000);
}

function playNext(){cancelAutoplay();navEpisode(1);}
function cancelAutoplay(){
  clearInterval(autoplayTimer);autoplayTimer=null;
  document.getElementById('autoplay-bar').style.display='none';
}
function toggleAutoplay(){
  autoplayOn=!autoplayOn;
  const btn=document.getElementById('autoplay-toggle');
  btn.textContent=autoplayOn?'ON':'OFF';
  btn.classList.toggle('active',autoplayOn);
  if(!autoplayOn)cancelAutoplay();
}

// Theater Mode
function toggleTheater(){
  theaterMode=!theaterMode;
  const wrap=document.getElementById('player-wrap');
  wrap.classList.toggle('theater',theaterMode);
  document.getElementById('theater-btn').classList.toggle('active',theaterMode);
  document.body.style.overflow=theaterMode?'hidden':'';
}

// Fullscreen
function toggleFullscreen(){
  const wrap=document.getElementById('player-wrap');
  if(!document.fullscreenElement){wrap.requestFullscreen().catch(()=>{});}
  else{document.exitFullscreen();}
}

// Picture in Picture
async function togglePiP(){
  const frame=document.getElementById('stream-frame');
  try{
    if(document.pictureInPictureElement){await document.exitPictureInPicture();}
    else{showToast('PiP','Use the player controls inside the video for PiP.','info');}
  }catch(e){showToast('PiP Not Available','Your browser may not support PiP for iframes.','info');}
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key==='n')navEpisode(1);
  if(e.key==='ArrowLeft'||e.key==='p')navEpisode(-1);
  if(e.key==='t')toggleTheater();
  if(e.key==='f')toggleFullscreen();
  if(e.key==='Escape'&&theaterMode)toggleTheater();
});

// Watchlist
function toggleWatchlist(){
  if(!animeTitle)return;
  const list=lsGet('nt_watchlist')||[];
  const idx=list.findIndex(i=>i.id===MAL_ID);
  if(idx>-1){list.splice(idx,1);showToast('Removed','Removed from watchlist','info');}
  else{list.unshift({id:MAL_ID,title:animeTitle,img:animeImg,added:Date.now()});showToast('Added!',animeTitle,'success');}
  lsSet('nt_watchlist',list);
  document.getElementById('watchlist-btn').classList.toggle('active',list.some(i=>i.id===MAL_ID));
}

async function buildEpList(){
  const list=document.getElementById('ep-list');
  const watched=lsGet('nt_watched_'+MAL_ID)||[];
  
  if(allEpisodes.length>0){
    list.innerHTML=allEpisodes.map(e=>`
      <div class="ep-item ${e.mal_id===currentEp?'active':''} ${watched.includes(e.mal_id)?'watched':''}" data-ep="${e.mal_id}" onclick="jumpTo(${e.mal_id})">
        <div class="ep-info">
          <div class="ep-info-num">Episode ${e.mal_id}</div>
          <div class="ep-info-title">${escHtml(e.title||'Episode '+e.mal_id)}</div>
          ${e.aired?`<div class="ep-info-dur">${new Date(e.aired).toLocaleDateString()}</div>`:''}
        </div>
        <div class="ep-check ${watched.includes(e.mal_id)?'done':''}">
          ${watched.includes(e.mal_id)?'<svg width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
        </div>
      </div>
    `).join('');
  } else if(totalEps>0){
    list.innerHTML=Array.from({length:totalEps},(_,i)=>i+1).map(n=>`
      <div class="ep-item ${n===currentEp?'active':''} ${watched.includes(n)?'watched':''}" data-ep="${n}" onclick="jumpTo(${n})">
        <div class="ep-info">
          <div class="ep-info-num">Episode ${n}</div>
          <div class="ep-info-title">Episode ${n}</div>
        </div>
        <div class="ep-check ${watched.includes(n)?'done':''}">
          ${watched.includes(n)?'<svg width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
        </div>
      </div>
    `).join('');
  } else {
    list.innerHTML='<div style="color:var(--text3);font-size:.84rem;padding:12px">No episode list available.</div>';
  }
  
  // Scroll active into view
  setTimeout(()=>{
    const active=list.querySelector('.ep-item.active');
    if(active)active.scrollIntoView({block:'center'});
  },100);
}

function jumpTo(ep){
  currentEp=ep;updateStreamSrc();updatePageInfo();window.scrollTo({top:0,behavior:'smooth'});
}

// Ep filter
document.getElementById('ep-filter').addEventListener('input',e=>{
  const q=e.target.value;
  document.querySelectorAll('.ep-item').forEach(el=>{
    el.style.display=q&&el.dataset.ep!==q?'none':'';
  });
});

async function loadRelated(id){
  try{
    const data=await apiFetch(`/anime/${id}/recommendations`);
    const recs=(data.data||[]).slice(0,12);
    if(!recs.length)return;
    const section=document.getElementById('related-section');
    section.style.display='';
    document.getElementById('related-grid').innerHTML=recs.map(r=>{
      const img=r.entry?.images?.webp?.image_url||r.entry?.images?.jpg?.image_url||'';
      return `<div class="rel-card" onclick="window.location.href='anime.html?id=${r.entry?.mal_id}'"><img class="rel-img skeleton" src="${img}" alt="${escHtml(r.entry?.title||'')}" loading="lazy" onload="this.classList.remove('skeleton')"/><div class="rel-title">${escHtml(r.entry?.title||'')}</div></div>`;
    }).join('');
  }catch{}
}

// Schedule autoplay on iframe load events (proxy via timer)
let frameLoadTimer = null;
document.getElementById('stream-frame').addEventListener('load',()=>{
  clearTimeout(frameLoadTimer);
  frameLoadTimer = setTimeout(()=>scheduleAutoplay(), 100);
});

async function init(){
  if(!MAL_ID){document.getElementById('watch-title').textContent='Invalid anime ID';return;}
  
  try{
    const [animeData, epsData] = await Promise.allSettled([
      apiFetch(`/anime/${MAL_ID}`),
      apiFetch(`/anime/${MAL_ID}/episodes?limit=100`)
    ]);
    
    if(animeData.status==='fulfilled'){
      const a=animeData.value.data;
      animeTitle=a.title_english||a.title||'Anime';
      animeImg=a.images?.webp?.image_url||a.images?.jpg?.image_url||'';
      totalEps=a.episodes||0;
      document.getElementById('anime-link').href=`anime.html?id=${MAL_ID}`;
      
      // Check watchlist
      const wl=lsGet('nt_watchlist')||[];
      document.getElementById('watchlist-btn').classList.toggle('active',wl.some(i=>i.id===MAL_ID));
    }
    
    if(epsData.status==='fulfilled'){
      allEpisodes=epsData.value.data||[];
      if(allEpisodes.length&&!totalEps)totalEps=allEpisodes.length;
    }
    
    updateStreamSrc();
    updatePageInfo();
    buildEpList();
    loadRelated(MAL_ID);
    
  }catch(e){
    document.getElementById('watch-title').textContent='Failed to load';
    updateStreamSrc();// still try to stream
  }finally{
    const loader=document.getElementById('page-loader');
    loader.classList.add('hidden');
    setTimeout(()=>loader.remove(),500);
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
