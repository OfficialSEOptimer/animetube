<!-- discover.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NamiTube - Advanced Catalog Discovery</title>
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png">
  <style>
    :root {
      --bg-base: #07050d;
      --bg-surface: rgba(20, 15, 35, 0.65);
      --accent: #8b5cf6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-glow: rgba(139, 92, 246, 0.15);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --transition-smooth: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-stack);
      overflow-x: hidden;
      max-width: 100%;
    }
    a { color: inherit; text-decoration: none; }
    button, select, input { background: none; border: none; font-family: inherit; color: inherit; }

    .container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 2rem; }
    @media (max-width: 768px) { .container { padding: 0 1rem; } }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      z-index: 1000;
      background: rgba(7, 5, 13, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
    }
    .header-inner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo img { height: 40px; }
    .header-nav { display: flex; align-items: center; gap: 2rem; }
    .nav-link { font-size: 0.95rem; font-weight: 500; opacity: 0.8; transition: var(--transition-smooth); }
    .nav-link:hover, .nav-link.active { opacity: 1; color: var(--accent); }

    /* ADVANCED FILTERS BAR */
    .filter-panel {
      background: var(--bg-surface);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-glow);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .filter-group label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
    
    .custom-select, .search-bar {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      color: #fff;
      outline: none;
      transition: var(--transition-smooth);
    }
    .custom-select:focus, .search-bar:focus {
      border-color: var(--accent);
    }
    .custom-select option { background-color: var(--bg-base); color: #fff; }

    /* CATALOG GRID */
    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 1.5rem;
    }
    @media (max-width: 480px) {
      .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 1rem; }
    }

    /* CARD STRUCTURE (PRESERVED) */
    .anime-card {
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-surface);
      border: 1px solid var(--border-glow);
      transition: var(--transition-smooth);
      position: relative;
    }
    .anime-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
    }
    .card-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; }
    .card-poster img { width: 100%; height: 100%; object-fit: cover; }
    .card-score { position: absolute; top: 8px; left: 8px; font-size: 0.7rem; padding: 2px 6px; background: rgba(139,92,246,0.85); border-radius: 4px; font-weight: bold; }
    .card-info { padding: 10px; }
    .card-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-subtitle { font-size: 0.75rem; color: var(--text-muted); display:flex; justify-content:space-between; margin-top:4px;}

    /* INFINITE SCROLL LOADER FLAG */
    .sentinel { height: 100px; display: flex; align-items: center; justify-content: center; width: 100%; grid-column: 1/-1; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s infinite linear;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube">
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="discover.html" class="nav-link active">Discover</a>
        <a href="schedule.html" class="nav-link">Schedule</a>
        <a href="donate.html" class="nav-link">Donate</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top: 110px;">
    <!-- FILTERS -->
    <div class="filter-panel">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="search-input" class="search-bar" placeholder="Type here...">
      </div>
      <div class="filter-group">
        <label>Genre</label>
        <select id="genre-select" class="custom-select">
          <option value="">All Genres</option>
          <option value="Action">Action</option>
          <option value="Adventure">Adventure</option>
          <option value="Comedy">Comedy</option>
          <option value="Drama">Drama</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Mystery">Mystery</option>
          <option value="Psychological">Psychological</option>
          <option value="Romance">Romance</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Slice of Life">Slice of Life</option>
          <option value="Supernatural">Supernatural</option>
          <option value="Thriller">Thriller</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Format</label>
        <select id="format-select" class="custom-select">
          <option value="">All Formats</option>
          <option value="TV">TV Show</option>
          <option value="MOVIE">Movie</option>
          <option value="OVA">OVA</option>
          <option value="SPECIAL">Special</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="sort-select" class="custom-select">
          <option value="POPULARITY_DESC">Popularity</option>
          <option value="SCORE_DESC">Score</option>
          <option value="TRENDING_DESC">Trending</option>
          <option value="ID_DESC">Recently Added</option>
        </select>
      </div>
    </div>

    <!-- MAIN DISPLAY -->
    <div class="catalog-grid" id="catalog-grid"></div>
    <div class="sentinel" id="sentinel"><div class="spinner"></div></div>
  </main>

  <script>
    const ANILIST_ENDPOINT = 'https://graphql.anilist.co';

    const filters = {
      search: '',
      genre: '',
      format: '',
      sort: 'POPULARITY_DESC',
      page: 1,
      hasMore: true,
      loading: false
    };

    const queryStr = `
      query($page: Int, $search: String, $genre: String, $format: MediaFormat, $sort: [MediaSort]) {
        Page(page: $page, perPage: 24) {
          pageInfo { hasNextPage }
          media(search: $search, genre: $genre, format: $format, sort: $sort, type: ANIME) {
            id
            title { romaji }
            coverImage { large }
            averageScore
            seasonYear
            episodes
          }
        }
      }
    `;

    async function fetchAniList(query, variables = {}) {
      const response = await fetch(ANILIST_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      const resData = await response.json();
      return resData.data;
    }

    function buildCard(media) {
      const score = media.averageScore ? (media.averageScore / 10).toFixed(1) : '?.?';
      const year = media.seasonYear || '';
      const episodes = media.episodes ? `${media.episodes} Ep` : 'Airing';
      return `
        <div class="anime-card" onclick="window.location.href='anime.html?id=${media.id}'">
          <div class="card-poster">
            <img src="${media.coverImage.large}" alt="${media.title.romaji}" loading="lazy">
            <span class="card-score">${score}</span>
          </div>
          <div class="card-info">
            <h3 class="card-title">${media.title.romaji}</h3>
            <div class="card-subtitle">
              <span>${year}</span>
              <span>${episodes}</span>
            </div>
          </div>
        </div>
      `;
    }

    async function loadCatalog(reset = false) {
      if (filters.loading) return;
      if (reset) {
        filters.page = 1;
        filters.hasMore = true;
        document.getElementById('catalog-grid').innerHTML = '';
        document.getElementById('sentinel').style.display = 'flex';
      }
      if (!filters.hasMore) return;

      filters.loading = true;

      const variables = {
        page: filters.page,
        sort: [filters.sort]
      };
      if (filters.search) variables.search = filters.search;
      if (filters.genre) variables.genre = filters.genre;
      if (filters.format) variables.format = filters.format;

      try {
        const data = await fetchAniList(queryStr, variables);
        const pageInfo = data.Page.pageInfo;
        const mediaList = data.Page.media;

        filters.hasMore = pageInfo.hasNextPage;
        
        const catalogGrid = document.getElementById('catalog-grid');
        const cardsHTML = mediaList.map(item => buildCard(item)).join('');
        catalogGrid.insertAdjacentHTML('beforeend', cardsHTML);

        if (!filters.hasMore) {
          document.getElementById('sentinel').style.display = 'none';
        }

        filters.page++;
      } catch (err) {
        console.error("Error loading discovery catalog:", err);
      } finally {
        filters.loading = false;
      }
    }

    /* DEBOUNCED SEARCH INPUT */
    let searchDebounce;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        filters.search = e.target.value.trim() || undefined;
        loadCatalog(true);
      }, 400);
    });

    /* EVENT LISTENERS ON FILTERS */
    document.getElementById('genre-select').addEventListener('change', (e) => {
      filters.genre = e.target.value || undefined;
      loadCatalog(true);
    });
    document.getElementById('format-select').addEventListener('change', (e) => {
      filters.format = e.target.value || undefined;
      loadCatalog(true);
    });
    document.getElementById('sort-select').addEventListener('change', (e) => {
      filters.sort = e.target.value;
      loadCatalog(true);
    });

    /* INFINITE SCROLL SYSTEM */
    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && filters.hasMore && !filters.loading) {
        loadCatalog();
      }
    }, { threshold: 0.1 });

    observer.observe(document.getElementById('sentinel'));

    // Initial load
    loadCatalog();
  </script>
</body>
</html>
