<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - NamiTube</title>
    <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHE6pMgjbJ6YDLaMAtDUZCs6Zhkvxl0_fQnb0c0ZCmJOYRB_4N8dQ0ZWosBq_sZPK2wFel2E43Z2meo25JL3i7IZYkJ35FZ7lZ_BZfwlWofAKGhF1gWpFsxofeGUr87Peu6s7xtgvJMnrbtNnd4vJPtB7uG3L_wJ9tT8PKRCh-PXSxlyY9Ufn8OAzDY_Y/s320/NamiTube%20Original%20Favicon.png" type="image/png">
    <style>
        :root {
            --bg: #050505;
            --bg2: #0a0a0f;
            --bg3: #120018;
            --purple: #8b5cf6;
            --purple2: #a855f7;
            --purple3: #7c3aed;
            --glass: rgba(20, 5, 30, 0.75);
            --text: #f1f0f5;
            --text2: #c5c0d5;
            --text3: #9a94b0;
            --radius: 16px;
            --radius2: 12px;
            --radius3: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--purple3);
            border-radius: 10px;
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            min-height: 60px;
        }
        .header-logo img {
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.5));
            border-radius: 6px;
            transition: var(--transition);
        }
        .header-logo img:hover {
            filter: drop-shadow(0 0 22px rgba(168, 85, 247, 0.85)) brightness(1.1);
        }
        .back-btn {
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: var(--text);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: var(--transition);
        }
        .back-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 14px 20px;
            border-radius: var(--radius2);
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .filter-bar select,
        .filter-bar input {
            background: rgba(20, 5, 30, 0.8);
            color: #fff;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }
        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        .filter-bar input {
            width: 100px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 18px;
        }
        .card-item {
            cursor: pointer;
            border-radius: var(--radius2);
            transition: var(--transition);
        }
        .card-item:hover {
            transform: translateY(-6px) scale(1.03);
        }
        .card-poster-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            border-radius: var(--radius2);
            overflow: hidden;
            background: var(--bg2);
            border: 1px solid rgba(139, 92, 246, 0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .card-item:hover .card-poster-wrap {
            border-color: var(--purple);
            box-shadow: 0 8px 40px rgba(139,92,246,0.2);
        }
        .card-poster-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--purple);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
        }
        .card-info {
            padding: 10px 4px 0;
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 0.7rem;
            color: var(--text3);
        }
        .load-more {
            display: block;
            margin: 30px auto;
            background: var(--purple);
            border: none;
            color: #fff;
            padding: 12px 32px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }
        .load-more:hover {
            background: var(--purple2);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            transform: translateY(-2px);
        }
        .skeleton-card {
            background: linear-gradient(90deg, #1a1025 25%, #251835 50%, #1a1025 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius2);
            aspect-ratio: 2/3;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .footer {
            background: rgba(10, 5, 18, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            padding: 50px 20px 30px;
            text-align: center;
            margin-top: 40px;
        }
        .footer-banner img {
            height: 48px;
            object-fit: contain;
            filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.6));
            border-radius: 6px;
            transition: var(--transition);
        }
        .footer-banner img:hover {
            filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.9)) brightness(1.15);
            transform: scale(1.05);
        }
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .footer-social a {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: var(--text2);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .footer-social a:hover {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
            transform: translateY(-3px);
        }
        .footer-disclaimer {
            max-width: 700px;
            margin: 0 auto 20px;
            font-size: 0.75rem;
            color: var(--text3);
            line-height: 1.6;
        }
        .footer-copyright {
            font-size: 0.8rem;
            color: var(--text3);
        }
        .footer-copyright span {
            color: var(--purple2);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn">←</a>
        <a href="index.html" class="header-logo">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube">
        </a>
        <div style="width:38px;"></div>
    </header>
    <div class="container">
        <h2 style="font-size:1.8rem; font-weight:700; margin-bottom:20px;">🔍 Discover Animation</h2>
        <div class="filter-bar">
            <select id="mediaType">
                <option value="all">All Types</option>
                <option value="movie">Movies</option>
                <option value="tv">TV Series</option>
            </select>
            <select id="sortBy">
                <option value="popularity.desc">Popularity</option>
                <option value="vote_average.desc">Top Rated</option>
                <option value="primary_release_date.desc">Newest</option>
                <option value="primary_release_date.asc">Oldest</option>
            </select>
            <input type="number" id="yearFrom" placeholder="Year from" min="1900" max="2026">
            <input type="number" id="yearTo" placeholder="Year to" min="1900" max="2026">
            <button id="applyFilter" class="load-more" style="margin:0;">Apply</button>
        </div>
        <div class="grid" id="resultsGrid"></div>
        <button id="loadMoreBtn" class="load-more" style="display:none;">Load More</button>
    </div>
    <footer class="footer">
        <div class="footer-banner">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwxClcajSZy1q1gj_1kf_9y1J7mutn4jWfqdhlBVbFjLkViz_Z3-nuIZ11W0qOd1jlFgMFYi-g_XrpIiRbQjZd-wPwg4RWWyhbR0QLw0-ZgX5DFncVPNOxrDBouMlbdz2sLvQS65JbQaLJpQReWhjceG8Rn5cxrNusoQAXieXFcX_q_LZthCYS1AsCR30/s320/NamiTube%20Original%20banner.png" alt="NamiTube">
        </div>
        <div class="footer-social">
            <a href="#">📘</a><a href="#">𝕏</a><a href="#">📷</a><a href="#">💬</a><a href="#">✈️</a><a href="#">🐙</a>
        </div>
        <p class="footer-disclaimer">This website does not host any video content... All trademarks belong to their respective owners.</p>
        <p class="footer-copyright">© 2026 <span>NamiTube</span>. All Rights Reserved. Powered by TMDB API</p>
    </footer>
    <script>
        const TMDB_API_KEY = "e10da2e2cbb23ea7ebfb64c3a188b64a";
        const TMDB_IMG = "https://image.tmdb.org/t/p/";
        const GENRE_ANIMATION = 16;
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = { type: 'all', sort: 'popularity.desc', yearFrom: '', yearTo: '' };

        function fetchTMDB(url) {
            const sep = url.includes('?') ? '&' : '?';
            return fetch(`https://api.themoviedb.org/3${url}${sep}api_key=${TMDB_API_KEY}&language=en-US`)
                .then(r => r.json());
        }
        function imgUrl(path, size = 'w500') {
            if (!path) return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" fill="%231a1025"><rect width="300" height="450"/><text x="150" y="225" text-anchor="middle" fill="%238b5cf6">N/A</text></svg>';
            return `${TMDB_IMG}${size}${path}`;
        }

        function buildCard(item, type) {
            const title = item.title || item.name || 'Unknown';
            const year = (item.release_date || item.first_air_date || '').substring(0,4);
            const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
            const card = document.createElement('div');
            card.className = 'card-item';
            card.onclick = () => { window.location.href = `info.html?id=${item.id}&type=${type}`; };
            card.innerHTML = `
                <div class="card-poster-wrap">
                    <img src="${imgUrl(item.poster_path)}" alt="${title}" loading="lazy" onerror="this.src='data:image/svg+xml,...'">
                    <span class="card-badge">${type==='movie'?'MOVIE':'TV'}</span>
                </div>
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    <div class="card-meta">${year||'TBA'} • ⭐${rating}</div>
                </div>`;
            return card;
        }

        function loadResults(page, append = false) {
            const grid = document.getElementById('resultsGrid');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (!append) {
                grid.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const sk = document.createElement('div');
                    sk.className = 'skeleton-card';
                    grid.appendChild(sk);
                }
            } else {
                loadMoreBtn.style.display = 'none';
                loadMoreBtn.textContent = 'Loading...';
            }

            let baseUrl = '';
            const f = currentFilters;
            const type = f.type;
            if (type === 'movie') baseUrl = '/discover/movie';
            else if (type === 'tv') baseUrl = '/discover/tv';
            else baseUrl = '/discover/movie'; // we'll handle combined? easier to do separate calls but for simplicity we'll fetch movie and tv? The requirement is animation only, so we can just fetch movie and tv separately? But filter "all" should show both. We'll do two parallel requests and combine.

            const buildQuery = (media) => {
                let url = `/discover/${media}?with_genres=16&sort_by=${f.sort}&page=${page}&vote_count.gte=5`;
                if (f.yearFrom) url += `&primary_release_date.gte=${f.yearFrom}-01-01`;
                if (f.yearTo) url += `&primary_release_date.lte=${f.yearTo}-12-31`;
                return url;
            };

            const promises = [];
            if (f.type === 'all') {
                promises.push(fetchTMDB(buildQuery('movie')).then(d => ({ results: d.results || [], totalPages: d.total_pages, type: 'movie' })));
                promises.push(fetchTMDB(buildQuery('tv')).then(d => ({ results: d.results || [], totalPages: d.total_pages, type: 'tv' })));
            } else {
                promises.push(fetchTMDB(buildQuery(f.type)).then(d => ({ results: d.results || [], totalPages: d.total_pages, type: f.type })));
            }

            Promise.all(promises).then(dataSets => {
                let combined = [];
                let maxPages = 0;
                dataSets.forEach(ds => {
                    ds.results.forEach(item => combined.push({...item, media_type: ds.type}));
                    maxPages = Math.max(maxPages, ds.totalPages);
                });
                // Deduplicate? might be rare. Sort by popularity descending if multiple.
                if (f.sort.includes('popularity')) combined.sort((a,b) => (b.popularity||0)-(a.popularity||0));
                else if (f.sort.includes('vote_average')) combined.sort((a,b) => (b.vote_average||0)-(a.vote_average||0));

                if (!append) grid.innerHTML = '';
                if (combined.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text3); padding:20px;">No results found.</p>';
                    loadMoreBtn.style.display = 'none';
                    return;
                }
                const frag = document.createDocumentFragment();
                combined.filter(i => i.poster_path).forEach(item => {
                    frag.appendChild(buildCard(item, item.media_type));
                });
                grid.appendChild(frag);
                totalPages = maxPages;
                if (page < totalPages) {
                    loadMoreBtn.style.display = 'block';
                    loadMoreBtn.textContent = 'Load More';
                } else {
                    loadMoreBtn.style.display = 'none';
                }
            }).catch(() => {
                if (!append) grid.innerHTML = '<p style="color:var(--text3);">Failed to load. Try again.</p>';
            });
        }

        document.getElementById('applyFilter').addEventListener('click', () => {
            currentFilters.type = document.getElementById('mediaType').value;
            currentFilters.sort = document.getElementById('sortBy').value;
            currentFilters.yearFrom = document.getElementById('yearFrom').value;
            currentFilters.yearTo = document.getElementById('yearTo').value;
            currentPage = 1;
            loadResults(1, false);
        });

        document.getElementById('loadMoreBtn').addEventListener('click', () => {
            currentPage++;
            loadResults(currentPage, true);
        });

        // Initial load
        loadResults(1);
    </script>
</body>
</html>
