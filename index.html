  <style>
    /* RESET & CORE VARIABLES */
    :root {
      --bg-base: #07050d;
      --bg-surface: rgba(20, 15, 35, 0.65);
      --bg-surface-solid: #120e22;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --accent-secondary: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-glow: rgba(139, 92, 246, 0.15);
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-stack);
      overflow-x: hidden;
      max-width: 100%;
      scroll-behavior: smooth;
    }
    a { color: inherit; text-decoration: none; }
    button { background: none; border: none; font-family: inherit; color: inherit; cursor: pointer; }

    /* LAYOUT PATTERNS */
    .container {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    @media (max-width: 768px) { .container { padding: 0 1rem; } }

    /* STICKY HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      z-index: 1000;
      background: rgba(7, 5, 13, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      transition: var(--transition-smooth);
    }
    header.scrolled {
      background: rgba(7, 5, 13, 0.95);
      height: 60px;
    }
    .header-inner {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    @media (max-width: 768px) { .header-inner { padding: 0 1rem; } }
    
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 24px;
      cursor: pointer;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--text-main);
      transition: var(--transition-smooth);
    }
    .header-logo img {
      height: 40px;
      object-fit: contain;
      display: block;
      transition: var(--transition-smooth);
    }
    @media (max-width: 768px) {
      .header-logo img { height: 32px; }
    }
    
    .header-nav { display: flex; align-items: center; gap: 2rem; }
    @media (max-width: 1024px) { .header-nav { display: none; } }
    .nav-link {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      position: relative;
      opacity: 0.8;
      transition: var(--transition-smooth);
    }
    .nav-link:hover, .nav-link.active {
      opacity: 1;
      color: var(--accent);
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: var(--transition-smooth);
    }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    .header-right { display: flex; align-items: center; gap: 1rem; }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .icon-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100%;
      background: rgba(10, 8, 18, 0.95);
      backdrop-filter: blur(30px);
      z-index: 1001;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      transition: var(--transition-smooth);
      border-right: 1px solid var(--border-glow);
    }
    .sidebar.active { left: 0; }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-logo img { height: 35px; }
    .close-btn { font-size: 1.5rem; opacity: 0.8; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1rem; }
    .sidebar-link { font-size: 1.1rem; display: flex; align-items: center; gap: 1rem; }
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

    /* HERO SLIDER */
    .hero-container {
      width: 100%;
      height: 85vh;
      min-height: 500px;
      position: relative;
      overflow: hidden;
      margin-top: 0;
    }
    .hero-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
      background-size: cover;
      background-position: center;
    }
    .hero-slide.active {
      opacity: 1;
      visibility: visible;
    }
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, var(--bg-base) 5%, rgba(7, 5, 13, 0.4) 60%, rgba(7, 5, 13, 0.8) 100%),
                  linear-gradient(90deg, var(--bg-base) 0%, rgba(7, 5, 13, 0.6) 40%, transparent 100%);
    }
    .hero-content {
      position: absolute;
      bottom: 12%;
      left: 5%;
      right: 5%;
      max-width: 650px;
      z-index: 10;
    }
    .hero-genres { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .badge {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge.score {
      background: rgba(139, 92, 246, 0.2);
      border-color: var(--accent);
      color: var(--text-main);
    }
    .hero-title {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 1rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    }
    .hero-synopsis {
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 1.8rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hero-actions { display: flex; gap: 1rem; align-items: center; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      transition: var(--transition-smooth);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .btn-primary:hover {
      background: #7c3aed;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    /* SLIDER NAV & DOTS */
    .hero-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 15;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(7, 5, 13, 0.6);
      border: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    .hero-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }
    .hero-btn-prev { left: 2%; }
    .hero-btn-next { right: 2%; }
    .hero-dots {
      position: absolute;
      bottom: 5%;
      right: 5%;
      display: flex;
      gap: 8px;
      z-index: 15;
    }
    .hero-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: var(--transition-smooth);
    }
    .hero-dot.active {
      width: 24px;
      border-radius: 4px;
      background: var(--accent);
    }

    /* CONTENT ROWS */
    .section-row {
      margin-bottom: 3.5rem;
      position: relative;
    }
    .row-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.25rem;
    }
    .row-title {
      font-size: clamp(1.2rem, 2.5vw, 1.5rem);
      font-weight: 700;
      position: relative;
      padding-left: 12px;
    }
    .row-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 4px;
      background: var(--accent);
      border-radius: 2px;
    }
    .slider-arrows { display: flex; gap: 8px; }
    .slider-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }
    .slider-arrow:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
    }
    
    .slider-viewport {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      display: flex;
      gap: 1.25rem;
      padding: 0.5rem 0 1.5rem 0;
      scrollbar-width: none; /* Firefox */
    }
    .slider-viewport::-webkit-scrollbar { display: none; } /* Chrome, Safari */
    
    /* CARDS */
    .anime-card {
      flex: 0 0 180px;
      scroll-snap-align: start;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-surface);
      border: 1px solid var(--border-glow);
      transition: var(--transition-smooth);
      position: relative;
    }
    @media (max-width: 480px) { .anime-card { flex: 0 0 140px; } }
    .anime-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.25);
    }
    .card-poster {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    .anime-card:hover .card-poster img { transform: scale(1.08); }
    .card-meta {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    .card-score {
      font-size: 0.7rem;
      padding: 2px 6px;
      background: rgba(139, 92, 246, 0.85);
      border-radius: 4px;
      font-weight: bold;
    }
    .card-info { padding: 10px; }
    .card-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    /* FULLSCREEN SEARCH OVERLAY */
    .search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(7, 5, 13, 0.97);
      backdrop-filter: blur(25px);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: var(--transition-smooth);
      padding: 2rem;
    }
    .search-overlay.active { opacity: 1; pointer-events: auto; }
    .search-header-box {
      width: 100%;
      max-width: 800px;
      margin: 2rem auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 18px 50px 18px 24px;
      font-size: 1.2rem;
      color: #fff;
      outline: none;
      transition: var(--transition-smooth);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
    }
    .search-close {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      opacity: 0.6;
    }
    .search-results-grid {
      max-width: 1100px;
      margin: 0 auto;
      max-height: 65vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.5rem;
      padding-bottom: 2rem;
    }

    /* SKELETON LOADERS */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 75%);
      background-size: 200% 100%;
      animation: skeleton-load 1.5s infinite;
    }
    @keyframes skeleton-load {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border-glow);
      background: #040208;
      padding: 3rem 0;
      margin-top: 5rem;
    }
    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }
    .footer-logo img { height: 35px; }
    .footer-nav { display: flex; gap: 2rem; }
    .disclaimer { font-size: 0.8rem; color: var(--text-muted); max-width: 600px; line-height: 1.5; }
    .copyright { font-size: 0.85rem; color: var(--text-muted); }
  </style>
</head>

  <script>
    /* CORE GRAPHQL CLIENT */
    const ANILIST_ENDPOINT = 'https://graphql.anilist.co';

    async function fetchAniList(query, variables = {}) {
      const response = await fetch(ANILIST_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      const resData = await response.json();
      if (!response.ok) throw new Error(resData.errors?.[0]?.message || 'GraphQL fetch failed');
      return resData.data;
    }

    /* VIEW CONTROLLERS */
    function toggleSidebar(open) {
      document.getElementById('sidebar').classList.toggle('active', open);
      document.getElementById('sidebar-overlay').classList.toggle('active', open);
    }
    
    function toggleSearch(open) {
      document.getElementById('search-overlay').classList.toggle('active', open);
      if (open) {
        document.getElementById('search-field').focus();
      }
    }

    // Header effect on scroll
    window.addEventListener('scroll', () => {
      document.getElementById('main-header').classList.toggle('scrolled', window.scrollY > 20);
    });

    /* HERO SLIDER SYSTEM */
    let currentHeroIndex = 0;
    let heroSlides = [];
    let heroTimer = null;

    function moveHero(direction) {
      if (!heroSlides.length) return;
      currentHeroIndex = (currentHeroIndex + direction + heroSlides.length) % heroSlides.length;
      updateHeroActiveState();
      resetHeroTimer();
    }

    function setHero(index) {
      currentHeroIndex = index;
      updateHeroActiveState();
      resetHeroTimer();
    }

    function updateHeroActiveState() {
      const slides = document.querySelectorAll('.hero-slide');
      const dots = document.querySelectorAll('.hero-dot');
      slides.forEach((s, idx) => s.classList.toggle('active', idx === currentHeroIndex));
      dots.forEach((d, idx) => d.classList.toggle('active', idx === currentHeroIndex));
    }

    function resetHeroTimer() {
      clearInterval(heroTimer);
      heroTimer = setInterval(() => moveHero(1), 7000);
    }

    /* SLIDER NAVIGATION FOR ROWS */
    function slideRow(viewportId, direction) {
      const el = document.getElementById(viewportId);
      if (!el) return;
      const cardWidth = el.firstElementChild ? el.firstElementChild.offsetWidth + 20 : 200;
      el.scrollBy({ left: direction * cardWidth * 3, behavior: 'smooth' });
    }

    /* TEMPLATE COMPILERS */
    function makeCard(media) {
      const score = media.averageScore ? (media.averageScore / 10).toFixed(1) : '?.?';
      const year = media.seasonYear || '';
      const episodes = media.episodes ? `${media.episodes} Ep` : 'Airing';
      return `
        <div class="anime-card" onclick="window.location.href='anime.html?id=${media.id}'">
          <div class="card-poster">
            <img src="${media.coverImage.large}" alt="${media.title.romaji}" loading="lazy">
            <div class="card-meta">
              <span class="card-score">${score}</span>
            </div>
          </div>
          <div class="card-info">
            <h3 class="card-title">${media.title.romaji}</h3>
            <div class="card-subtitle">
              <span>${year}</span>
              <span>${episodes}</span>
            </div>
          </div>
        </div>
      `;
    }

    /* INITIALIZATION & FETCHES */
    const queries = {
      homepage: `
        query {
          trending: Page(page: 1, perPage: 12) {
            media(type: ANIME, sort: TRENDING_DESC) {
              id
              title { romaji english }
              coverImage { large extraLarge }
              bannerImage
              averageScore
              episodes
              seasonYear
              genres
              description
            }
          }
          popular: Page(page: 1, perPage: 12) {
            media(type: ANIME, sort: POPULARITY_DESC) {
              id
              title { romaji }
              coverImage { large }
              averageScore
              episodes
              seasonYear
            }
          }
          movies: Page(page: 1, perPage: 12) {
            media(type: ANIME, format: MOVIE, sort: POPULARITY_DESC) {
              id
              title { romaji }
              coverImage { large }
              averageScore
              episodes
              seasonYear
            }
          }
        }
      `
    };

    async function init() {
      // Build Skeleton loaders
      const skeletonHTML = Array(8).fill(`
        <div class="anime-card skeleton" style="height: 270px; border-radius: 12px; opacity:0.35;"></div>
      `).join('');
      document.getElementById('trending-viewport').innerHTML = skeletonHTML;
      document.getElementById('popular-viewport').innerHTML = skeletonHTML;
      document.getElementById('movies-viewport').innerHTML = skeletonHTML;

      try {
        const data = await fetchAniList(queries.homepage);
        
        // Render Hero Slider
        heroSlides = data.trending.media.slice(0, 10);
        const heroSlider = document.getElementById('hero-slider');
        const dotsContainer = document.getElementById('hero-dots');
        
        let heroSlidesHTML = '';
        let dotsHTML = '';
        
        heroSlides.forEach((media, idx) => {
          const bg = media.bannerImage || media.coverImage.extraLarge || '';
          const score = media.averageScore ? (media.averageScore / 10).toFixed(1) : '?.?';
          const title = media.title.english || media.title.romaji;
          const cleanDesc = media.description ? media.description.replace(/<[^>]*>/g, '') : 'No synopsis available.';
          const genresHTML = media.genres.slice(0, 3).map(g => `<span class="badge">${g}</span>`).join('');

          heroSlidesHTML += `
            <div class="hero-slide ${idx === 0 ? 'active' : ''}" style="background-image: url('${bg}');">
              <div class="hero-overlay"></div>
              <div class="hero-content">
                <div class="hero-genres">
                  <span class="badge score">${score} ★</span>
                  ${genresHTML}
                </div>
                <h1 class="hero-title">${title}</h1>
                <p class="hero-synopsis">${cleanDesc}</p>
                <div class="hero-actions">
                  <a href="watch.html?id=${media.id}&ep=1" class="btn btn-primary">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    Watch Now
                  </a>
                  <a href="anime.html?id=${media.id}" class="btn btn-secondary">Details</a>
                </div>
              </div>
            </div>
          `;
          dotsHTML += `<button class="hero-dot ${idx === 0 ? 'active' : ''}" onclick="setHero(${idx})"></button>`;
        });

        // Prepend slider elements
        heroSlider.insertAdjacentHTML('afterbegin', heroSlidesHTML);
        dotsContainer.innerHTML = dotsHTML;
        resetHeroTimer();

        // Render Row 1: Trending
        const trendingHTML = data.trending.media.map(item => makeCard(item)).join('');
        document.getElementById('trending-viewport').innerHTML = trendingHTML;

        // Render Row 2: Popular
        const popularHTML = data.popular.media.map(item => makeCard(item)).join('');
        document.getElementById('popular-viewport').innerHTML = popularHTML;

        // Render Row 3: Movies
        const moviesHTML = data.movies.media.map(item => makeCard(item)).join('');
        document.getElementById('movies-viewport').innerHTML = moviesHTML;

      } catch (err) {
        console.error("Initialization failed:", err);
      }
    }

    /* DEBOUNCED SEARCH EXECUTION */
    const searchField = document.getElementById('search-field');
    const searchResults = document.getElementById('search-results');
    let searchDebounceTimer;

    searchField.addEventListener('input', (e) => {
      clearTimeout(searchDebounceTimer);
      const queryStr = e.target.value.trim();
      if (!queryStr) {
        searchResults.innerHTML = '';
        return;
      }
      
      searchDebounceTimer = setTimeout(async () => {
        searchResults.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color:var(--text-muted);">Searching...</div>`;
        try {
          const graphQuery = `
            query($query: String) {
              Page(page: 1, perPage: 18) {
                media(search: $query, type: ANIME, sort: POPULARITY_DESC) {
                  id
                  title { romaji }
                  coverImage { large }
                  averageScore
                  episodes
                  seasonYear
                }
              }
            }
          `;
          const data = await fetchAniList(graphQuery, { query: queryStr });
          if (!data.Page.media.length) {
            searchResults.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color:var(--text-muted);">No results found for "${queryStr}"</div>`;
            return;
          }
          searchResults.innerHTML = data.Page.media.map(item => makeCard(item)).join('');
        } catch (err) {
          searchResults.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #ef4444;">Search Failed. Try again later.</div>`;
        }
      }, 500);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') toggleSearch(false);
    });

    // Start
    init();
  </script>
</body>
</html>
